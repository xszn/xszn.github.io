        <astro-island uid="BboV8" prefix="r0" component-url="/astro/SearchBar.C1Q_gaa_.js" component-export="default"
          renderer-url="/astro/client.CBwL3ilQ.js"
          props="{&quot;searchList&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;2025/03/ji-chang-ce-su-gong-ju&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;机场测速工具 | MiaoKo 使用教程&quot;],&quot;meta_title&quot;:[0,&quot;机场测速工具 | MiaoKo 使用教程 | 节点批量测速 | TG 测速机器人&quot;],&quot;description&quot;:[0,&quot;机场测速可以帮助我们更好地了解节点的网络状况，并为选择和管理节点提供参考，同时提升上网体验。MiaoKo 是一款自动化测试机器人，不仅能自动测试节点，还能生成详细报告。本文将介绍 MiaoKo 的使用教程，包括加入群组、积分获取、指令发送等，为确保你能顺利使用这一 TG 测速机器人。&quot;],&quot;date&quot;:[3,&quot;2025-03-04T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/04/ji-chang-ce-su-gong-ju.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;科学上网&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Mark Dinn&quot;]]],&quot;tags&quot;:[1,[[0,&quot;telegram&quot;],[0,&quot;机器人&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;机场测速可以帮助我们更好地了解节点的网络状况，并为选择和管理节点提供参考，同时提升上网体验。MiaoKo 是一款自动化测试机器人，不仅能自动测试节点，还能生成详细报告。本文将介绍 MiaoKo 的使用教程，包括加入群组、积分获取、指令发送等，为确保你能顺利使用这一 TG 测速机器人。\r\n\r\n## MiaoKo\r\n\r\n目前 MiaoKo 已停止开发，只能通过租用权限使用服务，这里选择使用“翻翻墙”维护的基于 MiaoKo 测速机器人（FFQ.LA Public Test Center）。翻翻墙采用积分制管理，测试时会扣除相应积分，也可贡献后端服务以享受所有权限。翻翻墙测速机器人不仅支持订阅速度测试，还支持拓扑结构、流媒体、延迟等测试。\r\n\r\n**1. 加入群组**\r\n\r\n使用机器人前需加入 [🛫 翻翻墙 | 公益测速 - 积分制](https://t.me/FFQMiaokoPublic)（以下简称“积分群”）群组。每日签到前需加入 [🛫 翻翻墙 | ✨ MiaoKo | ⛱ 人才交流中心](https://t.me/FFQGroup)（以下简称“交流群”）群组，聊天吹水也在该群内进行。\r\n\r\n**2. 获取积分**\r\n\r\n积分获取主要通过群内每日签到、聊天吹水、购买积分等方式。每日签到请在交流群内发送 `/签到` 。\r\n\r\n**3. 发送指令**\r\n\r\n在积分群内发送 `/help@FFQPublicBot` 获取帮助菜单。带有 \&quot;url\&quot; 的指令可使用订阅链接进行测试，如速度测试 `/speedurl 订阅链接`。你也可以发送 `/ffq`，无需记住指令。\r\n\r\n[![miaoko发送指令](/images/posts/2025/03/04/miaoko-fa-song-zhi-ling.webp)](/images/posts/2025/03/04/miaoko-fa-song-zhi-ling.webp) \r\n\r\n**4. 测试步骤**\r\n\r\n向机器人发送测试指令后，按以下操作进行：\r\n\r\n选择测试后端。此时会通过后端宽带进行测试，如测试结果不佳时，可随时更换后端。\r\n\r\n[![miaoko测试步骤-选择测试后端](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-ce-shi-hou-duan.webp)](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-ce-shi-hou-duan.webp)\r\n\r\n选择排序方式。按需选择或默认即可。\r\n\r\n[![miaoko测试步骤-选择排序方式](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-pai-xu-fang-shi.webp)](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-pai-xu-fang-shi.webp)\r\n\r\n等待测试完成，结果会公布在群内，需注意查看，不要被后续测试顶上去找不到。\r\n\r\n**5. 查看报告**\r\n\r\n[![miaoko查看报告](/images/posts/2025/03/04/miaoko-cha-kan-bao-gao.webp)](/images/posts/2025/03/04/miaoko-cha-kan-bao-gao.webp)\r\n\r\n测试完成后，群内会收到测速图报告，但不会有提醒。\r\n\r\n机场测速完成后，你可以选择低延迟高速度的节点，提升上网体验。不同时间段的数据会有所不同，为避免晚高峰，可选择在早上测速。测速前最好征得商家的同意，否则短时间内大量消耗流量可能引起注意，导致账号被封禁。\r\n\r\n参考资料\r\n\r\n1. [MiaoKo 官方网站](https://www.miaoko.net/)  \r\n2. [FFQ MiaoKo 公益测速机器人使用说明 - 翻翻墙导航](https://www.ffq.la/1180.html)  \r\n3. [MiaoKo v4 命令详细文档 - 翻翻墙导航](https://www.ffq.la/1216.html)&quot;]}]]]}"
