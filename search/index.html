ributeChangedCallback(){this.hydrate()}}d(y,"observedAttributes",["props"]),customElements.get("astro-island")||customElements.define("astro-island",y)}})();</script><astro-island uid="2jAtS2" prefix="r0" component-url="/astro/SearchBar.Dpbs9nJM.js" component-export="default" renderer-url="/astro/client.CBwL3ilQ.js" props="{&quot;searchList&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;2025/03/buster&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Buster：验证码识别工具，一键绕过 reCAPTCHA&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Buster 是一款浏览器扩展，利用语音识别技术自动解决验证码，特别是 reCAPTCHA 的音频验证码。它通过模拟用户操作或语音识别来完成验证，支持多种语音服务，界面简单。本文介绍了 Buster 的安装、配置和使用方法，帮助用户轻松应对验证码，提高浏览效率和体验。&quot;],&quot;date&quot;:[3,&quot;2025-03-20T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/20/buster.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;],[0,&quot;扩展程序&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Buster 是一款浏览器扩展，利用语音识别技术自动解决验证码，特别是 reCAPTCHA 的音频验证码。它通过模拟用户操作或语音识别来完成验证，支持多种语音服务，界面简单。本文介绍了 Buster 的安装、配置和使用方法，帮助用户轻松应对验证码，提高浏览效率和体验。\r\n\r\n## Buster 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Buster 使用教程](https://youtu.be/YOS9jgGcbK0)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Buster 下载\&quot; link=\&quot;https://github.com/dessant/buster/releases\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n打开 Buster 仓库，选择应用商店点击 `添加至浏览器` 安装，完成后浏览器右上角显示图标。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/20/buster-preview.webp\&quot;\r\n    alt=\&quot;Buster 扩展预览\&quot;\r\n/&gt;\r\n\r\n**验证码识别**\r\n\r\n遇到验证码时，点击 `扩展图标` 自动识别，失败时可选择人工解决。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/20/buster-tu-pian-yan-zheng-ma-shi-bie.webp\&quot;\r\n    alt=\&quot;Buster 图片验证码识别\&quot;\r\n/&gt;\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/20/buster-yin-pin-yan-zheng-ma-shi-bie.webp\&quot;\r\n    alt=\&quot;Buster 音频验证码识别\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;info\&quot;&gt;如果你遇到 APl quota exceeded（APl 配额已超出）……请点击最左边的 `刷新` 按钮，再重试。&lt;/Notice&gt;\r\n\r\nBuster 支持文字、图片和音频验证码，利用自动化工具和客户端应用提高验证码通过率。它注重隐私保护，不记录用户信息。无论普通用户还是开发者，Buster 都能带来更顺畅的上网体验。\r\n\r\n**参考资料**\r\n\r\n1. [Buster GitHub](https://github.com/dessant/buster)\r\n2. [dessant/buster Wiki - GitHub](https://github.com/dessant/buster/wiki)\r\n3. [Buster: Captcha Solver for Humans - Chrome 应用商店](https://chromewebstore.google.com/detail/buster-captcha-solver-for/mpbjkejclgfgadiemmefgebjfooflfhl)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/miaoko&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;MiaoKo：机场测速工具，支持节点批量测速&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;MiaoKo 是一款自动化测速机器人，能自动测试节点并生成详细报告。MiaoKo 测速机器人已停止开发，现由翻翻墙维护，通过积分制租用权限支持多项网络测试。使用时需加入指定群组，获取积分后发送指令进行测试，测试结果会在群内公布，方便用户选择优质节点，提升网络质量。&quot;],&quot;date&quot;:[3,&quot;2025-03-04T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/04/miaoko.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;机器人&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;MiaoKo 是一款自动化测速机器人，能自动测试节点并生成详细报告。MiaoKo 测速机器人已停止开发，现由翻翻墙维护，通过积分制租用权限支持多项网络测试。使用时需加入指定群组，获取积分后发送指令进行测试，测试结果会在群内公布，方便用户选择优质节点，提升网络质量。\r\n\r\n## MiaoKo 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[MiaoKo 使用教程](https://youtu.be/CGfgnxcbAj8)》。&lt;/Notice&gt;\r\n\r\n## 加入\r\n\r\n&lt;Button label=\&quot;翻翻墙交流群组\&quot; link=\&quot;https://t.me/FFQGroup\&quot; style=\&quot;solid\&quot; /&gt;\r\n&lt;Button label=\&quot;翻翻墙积分群组\&quot; link=\&quot;https://t.me/FFQMiaokoPublic\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/04/miaoko-preview.webp\&quot;\r\n    alt=\&quot;MiaoKo 翻翻墙群组预览\&quot;\r\n/&gt;\r\n\r\n**1. 加入群组**\r\n\r\n使用机器人前需先加入 `交流群` 和 `积分群` 两个群组，签到和聊天均在 `交流群` 进行。\r\n\r\n**2. 获取积分**\r\n\r\n积分主要通过交流群每日发送 `/签到`、聊天互动和购买获得。\r\n\r\n**3. 发送指令**\r\n\r\n在积分群发送 `/help@FFQPublicBot` 获取帮助，使用带“url”的指令测试订阅链接，也可直接发送 `/ffq` 简化操作。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/04/miaoko-fa-song-zhi-ling.webp\&quot;\r\n    alt=\&quot;MiaoKo 发送指令\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;更多指令请移步《[MiaoKo v4 命令详细文档](https://www.ffq.la/1216.html)》。&lt;/Notice&gt;\r\n\r\n**4. 测试步骤**\r\n\r\n选择测试后端后将通过其宽带进行测速，若结果不佳可随时更换后端。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/04/miaoko-xuan-ze-ce-shi-hou-duan.webp\&quot;\r\n    alt=\&quot;MiaoKo 选择测试后端\&quot;\r\n/&gt;\r\n\r\n根据需要选择排序方式，或使用默认设置即可。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/04/miaoko-xuan-ze-pai-xu-fang-shi.webp\&quot;\r\n    alt=\&quot;MiaoKo 选择排序方式\&quot;\r\n/&gt;\r\n\r\n**5. 查看报告**\r\n\r\n测试完成后，群内会收到测速图报告，但不会有提醒。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/04/miaoko-cha-kan-bao-gao.webp\&quot;\r\n    alt=\&quot;MiaoKo 查看报告\&quot;\r\n/&gt;\r\n\r\n机场测速完成后，你可以选择低延迟高速度的节点，提升上网体验。不同时间段的数据会有所不同，为避免晚高峰，可选择在早上测速。测速前最好征得商家的同意，否则短时间内大量消耗流量可能引起注意，导致账号被封禁。\r\n\r\n**参考资料**\r\n\r\n1. [MiaoKo 官网](https://www.miaoko.net/)\r\n2. [FFQ MiaoKo 公益测速机器人使用说明 - 翻翻墙导航](https://www.ffq.la/1180.html)\r\n3. [MiaoKo v4 命令详细文档 - 翻翻墙导航](https://www.ffq.la/1216.html)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/geek-uninstaller&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Geek Uninstaller：卸载软件工具，深度清理顽固程序&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Geek Uninstaller 是一款轻量且免费的卸载工具，支持 Windows 8 及以上系统，能彻底清理软件及残留文件，包括 Microsoft Store 应用。它具备深度卸载和强制卸载功能，操作简单且便携。Pro 版本提供批量卸载、安装监控和启动项管理等高级功能，帮助用户优化系统性能，解决卸载难题，保持电脑整洁高效。&quot;],&quot;date&quot;:[3,&quot;2025-03-25T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/25/geek-uninstaller.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Geek Uninstaller 是一款轻量且免费的卸载工具，支持 Windows 8 及以上系统，能彻底清理软件及残留文件，包括 Microsoft Store 应用。它具备深度卸载和强制卸载功能，操作简单且便携。Pro 版本提供批量卸载、安装监控和启动项管理等高级功能，帮助用户优化系统性能，解决卸载难题，保持电脑整洁高效。\r\n\r\n## Geek Uninstaller 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Geek Uninstaller 使用教程](https://youtu.be/4OHGbHnfgfM)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Geek Uninstaller 下载\&quot; link=\&quot;https://geekuninstaller.com/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载完成后，无需安装，直接双击 `.exe` 文件即可运行。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/25/geek-uninstaller-gui.webp\&quot;\r\n    alt=\&quot;Geek Uninstaller 界面\&quot;\r\n/&gt;\r\n\r\n**卸载普通程序**\r\n\r\n打开 Geek Uninstaller 后，它会自动扫描已安装的软件，右键点击目标程序选择 `卸载`，完成后软件会自动扫描残留文件和注册表，点击 `完成` 即可彻底清理。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/25/geek-uninstaller-xie-zai.webp\&quot;\r\n    alt=\&quot;Geek Uninstaller 卸载\&quot;\r\n/&gt;\r\n\r\n**卸载顽固程序**\r\n\r\n当程序无法正常卸载时，可右键点击该程序选择 `强制删除`，Geek Uninstaller 会按照提示操作，强制清除该程序及其所有相关文件和注册表，彻底移除顽固软件。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/25/geek-uninstaller-qiang-zhi-shan-chu.webp\&quot;\r\n    alt=\&quot;Geek Uninstaller 强制删除\&quot;\r\n/&gt;\r\n\r\n**卸载 Microsoft Store 应用**\r\n\r\n在 Geek Uninstaller 顶部 `查看` 中切换到 `Windows Store Apps` 标签页，右键选择应用点击 `卸载` 即可删除。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/25/geek-uninstaller-microsoft-store-apps.webp\&quot;\r\n    alt=\&quot;Geek Uninstaller Microsoft Store Apps\&quot;\r\n/&gt;\r\n\r\nGeek Uninstaller 是一款免费、轻量且易用的卸载工具，支持深度扫描并彻底清除软件及残留文件和注册表，包含强制卸载功能，适合卸载顽固程序。它界面简洁，支持多语言和便携使用，无需安装，兼容 Windows 8 及以上系统。使用时建议备份重要数据以防误删，部分安全软件可能误报，需添加信任。\r\n\r\n**参考资料**\r\n\r\n1. [Geek Uninstaller 官网](https://geekuninstaller.com/)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/fxsound&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;FxSound：声音增强器，免费提升电脑音质&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;FxSound 是一款专业的免费开源音频增强软件，支持 Windows 系统，能显著提升音质和音效体验。它内置多种预设和均衡器，适合听音乐、看电影和玩游戏，用户可自定义调整声音效果。软件界面简洁，操作简单，依靠社区支持不断优化，帮助用户打造个性化、高质量的音频环境，满足日常和专业需求。&quot;],&quot;date&quot;:[3,&quot;2025-03-26T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/26/fxsound.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;音乐&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;],[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;FxSound 是一款专业的免费开源音频增强软件，支持 Windows 系统，能显著提升音质和音效体验。它内置多种预设和均衡器，适合听音乐、看电影和玩游戏，用户可自定义调整声音效果。软件界面简洁，操作简单，依靠社区支持不断优化，帮助用户打造个性化、高质量的音频环境，满足日常和专业需求。\r\n\r\n## FxSound 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[FxSound 使用教程](https://youtu.be/avNOUjP8ZiY)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;FxSound 下载\&quot; link=\&quot;https://www.fxsound.com/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载最新安装包，双击运行文件，按照提示完成安装即可。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/26/fxsound-gui.webp\&quot;\r\n    alt=\&quot;FxSound 界面\&quot;\r\n/&gt;\r\n\r\n**1. 音效调整**\r\n\r\nFxSound 提供多种音效设置，用户可根据个人喜好自定义音频输出：\r\n\r\n- 清晰度：增强高频部分，使声音更清晰、细腻\r\n- 环境：模拟音乐厅等大型空间，增加音频的立体感和空间感\r\n- 环绕声：扩展立体声效果，使音频的空间感更加开阔\r\n- 动态增强：平滑音量波动，使整体音量更加均匀，提升力度\r\n- 低音增强：强化低频，提升音乐的震撼力和深度\r\n\r\n**2. 均衡器（EQ）调整**\r\n\r\n通过拖动 EQ 控件，增强或减弱特定频率（如低音、中音、高音）：\r\n\r\n- 低频：如果您想要更多低音，您可以使用 EQ 来调高低频\r\n- 中频：如果您想添加一些“沙哑”特性，您可以调整中频\r\n- 高频：如果您的音频太刺耳，您可以降低 EQ 的高音范围\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/26/fxsound-jun-heng-qi.webp\&quot;\r\n    alt=\&quot;FxSound 均衡器\&quot;\r\n/&gt;\r\n\r\n**3. 预设管理**\r\n\r\n- 导出预设：打开 FxSound 设置菜单，选择 `导出预设`，选择需要导出的预设文件，确认后保存至本地\r\n- 导入预设：将预设文件放置在已知目录（如桌面或文档文件夹），在 FxSound 设置中选择 `导入预设`，导航至文件并加载\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/26/fxsound-dao-ru-yu-she.webp\&quot;\r\n    alt=\&quot;FxSound 导入预设\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;更多预设请移步《[FxSound Presets](https://www.fxsound.com/presets)》。&lt;/Notice&gt;\r\n\r\n通过本文的教程，相信你已经掌握了 FxSound 的基本使用方法。无论是调整音效、设置 EQ，还是导入导出预设，你都可以根据自己的喜好，打造个性化的音频体验。同时，由于 FxSound 已经开源，欢迎广大用户参与到社区建设中来，共同完善这款优秀的音频处理软件。\r\n\r\n**参考资料**\r\n\r\n1. [FxSound 官网](https://www.fxsound.com/)\r\n2. [Articles, Courses, Guides, and Support - FxSound Learning Center](https://www.fxsound.com/learning-center)\r\n3. [FxSound GitHub](https://github.com/fxsound2/fxsound-app)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/idm-activation-script&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;IDM Activation Script：IDM 激活工具，轻松永久免费使用&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;IDM Activation Script 是一款开源激活脚本，可冻结试用期，实现永久免费使用。它支持 Windows 7 至 11 系统，通过重置试用期和锁定注册表实现激活，且更新后激活信息依然有效。用户可通过命令行或图形界面操作，简单易用，提升 IDM 使用体验。&quot;],&quot;date&quot;:[3,&quot;2025-03-24T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/24/idm-activation-script.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;],[0,&quot;开源软件&quot;],[0,&quot;脚本程序&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;IDM Activation Script 是一款开源激活脚本，可冻结试用期，实现永久免费使用。它支持 Windows 7 至 11 系统，通过重置试用期和锁定注册表实现激活，且更新后激活信息依然有效。用户可通过命令行或图形界面操作，简单易用，提升 IDM 使用体验。\r\n\r\n## IDM Activation Script 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[IDM Activation Script 使用教程](https://youtu.be/aj9LYo5WzrQ)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n``` powershell\r\niex(irm is.gd/idm_reset)\r\n```\r\n\r\n或\r\n\r\n&lt;Button label=\&quot;IDM Activation Script 下载\&quot; link=\&quot;https://github.com/lstprjct/IDM-Activation-Script/releases\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;PowerShell\&quot;&gt;\r\n        右键点击 `开始` 菜单，选择管理员权限的 PowerShell，复制粘贴命令后按 `回车` 运行脚本。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;命令脚本\&quot;&gt;\r\n        找到下载的 `IAS.cmd` 文件，右键选择 `以管理员身份运行` 来执行脚本。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/24/idm-activation-script-cli.webp\&quot;\r\n    alt=\&quot;IDM Activation Script CLI\&quot;\r\n/&gt;\r\n\r\n**推荐方法**\r\n\r\n在 IDM Activation Script 窗口中按提示操作，建议按 `2` 选择“Freeze Trial”选项以锁定 30 天试用期，实现永久免费使用。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/24/idm-activation-script-shi-yong-qi-dong-jie.webp\&quot;\r\n    alt=\&quot;IDM Activation Script 试用期冻结\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;info\&quot;&gt;如果无法连接到远程服务器，可以尝试使用代理软件开启 Tun 模式。&lt;/Notice&gt;\r\n\r\n**备用方法**\r\n\r\n从 GitHub 下载 IDM Activation Script，右键以管理员身份运行 `IAS.cmd` 文件，按 `2` 选择“Freeze Trial”冻结试用期。\r\n\r\nIDM Activation Script 是一个实用的工具，可以帮助用户免费使用 IDM。按照上述步骤操作，即可轻松冻结 IDM 的试用期。建议使用 PowerShell 方法，并定期更新脚本以获得最佳效果。\r\n\r\n**参考资料**\r\n\r\n1. [IDM-Activation-Script GitHub](https://github.com/lstprjct/IDM-Activation-Script)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/anytxt-searcher&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Anytxt Searcher：全文搜索工具，快速定位文件内容&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Anytxt Searcher 是一款功能强大的文件内容搜索工具，适用于多种 Windows 版本，包括 Windows 11/10/8/7 至 2003 版本。它支持多种文档格式的全文索引，包括 Microsoft Office 格式、PDF、电子书格式、WPS Office 格式，甚至是图像中的文本内容。Anytxt Searcher 还提供多语言支持和快速全文搜索功能，几乎只需 1 秒即可获得搜索结果。&quot;],&quot;date&quot;:[3,&quot;2025-04-03T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/03/anytxt-searcher.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Anytxt Searcher 是一款功能强大的文件内容搜索工具，适用于多种 Windows 版本，包括 Windows 11/10/8/7 至 2003 版本。它支持多种文档格式的全文索引，包括 Microsoft Office 格式、PDF、电子书格式、WPS Office 格式，甚至是图像中的文本内容。Anytxt Searcher 还提供多语言支持和快速全文搜索功能，几乎只需 1 秒即可获得搜索结果。\r\n\r\n## Anytxt Searcher 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Anytxt Searcher 使用教程](https://youtu.be/Ax7Hpkx99zs)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Anytxt Serarcher 下载\&quot; link=\&quot;https://anytxt.net/download/\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载完成后，双击安装包按提示操作即可，过程简单快速，无需额外软件支持。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/03/anytxt-searcher-gui.webp\&quot;\r\n    alt=\&quot;Anytxt Searcher 界面\&quot;\r\n/&gt;\r\n\r\n**1. 启动软件**\r\n\r\n安装完成后，启动 Anytxt Searcher，软件会自动开始索引电脑中的文件。\r\n\r\n**2. 开始搜索**\r\n\r\n在搜索框输入关键词，按回车键即可快速开始搜索，几秒钟内显示结果。\r\n\r\n**3. 查看文件内容**\r\n\r\n点击搜索结果即可预览文件内容，支持多种文件格式的实时预览。\r\n\r\n**4. 设置索引目录**\r\n\r\n在软件界面中，点击左边的 `...` 按钮，选择需要索引的文件夹或磁盘。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/03/anytxt-searcher-guo-lv.webp\&quot;\r\n    alt=\&quot;Anytxt Searcher 过滤\&quot;\r\n/&gt;\r\n\r\nAnytxt Searcher 是一款非常有用的文件内容搜索工具，能够大大提高工作效率。它支持多种文件格式，提供快速全文搜索功能，并支持多语言文档的全文索引。使用时要定期更新索引，保证搜索结果最新；合理设置索引目录，避免无用文件影响效率；还可利用高级功能，如 AES256 加密和多语言 OCR，满足不同需求，提升工作效率。\r\n\r\n**参考资料**\r\n\r\n1. [Anytxt Searcher 官网](https://anytxt.net/)\r\n2. [Anytxt Searcher 用户手册](https://anytxt.net.cn/usermanual/1.1.%E5%BC%80%E5%A7%8B%E6%90%9C%E7%B4%A2.html)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/clash-verge-rev&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Clash Verge Rev：代理软件推荐，解锁网络自由神器&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Clash Verge Rev 是一款界面美观、操作简单的科学上网工具，支持 Windows、macOS 和 Linux 系统，内置 Clash.Meta 内核并可切换 Alpha 版本。适合新手和老手使用，Windows 用户建议用 x64 版本，Win7 不支持。软件自带 Webview2 环境，GitHub 提供正式版和测试版下载，还有详细安装和使用教程，支持多种代理协议，方便快速配置和使用。&quot;],&quot;date&quot;:[3,&quot;2025-03-23T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/23/clash-verge-rev.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Clash Verge Rev 是一款界面美观、操作简单的科学上网工具，支持 Windows、macOS 和 Linux 系统，内置 Clash.Meta 内核并可切换 Alpha 版本。适合新手和老手使用，Windows 用户建议用 x64 版本，Win7 不支持。软件自带 Webview2 环境，GitHub 提供正式版和测试版下载，还有详细安装和使用教程，支持多种代理协议，方便快速配置和使用。\r\n\r\n## Clash Verge Rev 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Clash Verge Rev 使用教程](https://youtu.be/AVGxxb8EPlk)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Clash Verge Rev 下载\&quot; link=\&quot;https://www.clashverge.dev/install.html\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;Windows\&quot;&gt;\r\n        双击 `.exe` 文件安装。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;macOS\&quot;&gt;\r\n        拖拽 `.dmg` 文件到应用文件夹。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;Linux\&quot;&gt;\r\n        给 `.AppImage` 文件权限后运行。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/23/clash-verge-rev-gui.webp\&quot;\r\n    alt=\&quot;Clash Verge Rev 界面\&quot;\r\n/&gt;\r\n\r\n**1. 导入订阅**\r\n\r\n订阅是节点信息，打开 Clash Verge Rev 左侧 `订阅` 用 URL `导入` 链接，导入后配置文件显示列表，点击即可使用。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/23/clash-verge-rev-dao-ru-ding-yue.webp\&quot;\r\n    alt=\&quot;Clash Verge Rev 导入订阅\&quot;\r\n/&gt;\r\n\r\n**2. 选择节点和模式**\r\n\r\n点左侧的 `代理`，在代理组里选一个节点，点一下就能切换。\r\n\r\n在右上角的模式里选：\r\n\r\n- 规则：按规则走代理，适合日常上网\r\n- 全局：所有流量都走代理\r\n- 直连：所有流量都不走代理\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/23/clash-verge-rev-xuan-ze-mo-shi.webp\&quot;\r\n    alt=\&quot;Clash Verge Rev 选择模式\&quot;\r\n/&gt;\r\n\r\n**3. 开启代理**\r\n\r\n点左侧的 `设置`，开启代理或 Tun 模式：\r\n\r\n- 系统代理：Clash Verge Rev 会自动设置系统代理\r\n- Tun 模式：开关，适合游戏或命令行工具等复杂场景\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/23/clash-verge-rev-kai-qi-dai-li.webp\&quot;\r\n    alt=\&quot;Clash Verge Rev 开启代理\&quot;\r\n/&gt;\r\n\r\nClash Verge Rev 是一个简单又好用的科学上网工具。用它上网更自由，也更安全。如果有问题，可以去 GitHub 上找答案或提建议。\r\n\r\n**参考资料**\r\n\r\n1. [简介 - Clash Verge Rev Docs](https://www.clashverge.dev/)\r\n2. [快速入门 - Clash Verge Rev Docs](https://www.clashverge.dev/guide/quickstart.html)\r\n3. [Clash Verge Rev GitHub](https://github.com/clash-verge-rev/clash-verge-rev)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/microsoft-activation-scripts&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Microsoft Activation Scripts：KMS 激活工具，Windows、Office 永久激活不求人&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Microsoft Activation Scripts（MAS）是一个开源工具，帮助用户激活 Windows 和 Office。它支持多种激活方式，包括永久和临时方案，适用于 Windows 7 到 11 以及 Office 2013 到 365。无论是个人还是企业用户，遇到激活问题时，MAS 都能提供简单可靠的解决方案。&quot;],&quot;date&quot;:[3,&quot;2025-04-13T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/13/microsoft-activation-scripts.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;],[0,&quot;开源软件&quot;],[0,&quot;脚本程序&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Microsoft Activation Scripts（MAS）是一个开源工具，帮助用户激活 Windows 和 Office。它支持多种激活方式，包括永久和临时方案，适用于 Windows 7 到 11 以及 Office 2013 到 365。无论是个人还是企业用户，遇到激活问题时，MAS 都能提供简单可靠的解决方案。\r\n\r\n## Microsoft Activation Scripts 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;~~视频教程请移步 YouTube 观看《[Microsoft Activation Scripts 使用教程]()》。~~&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n``` powershell\r\nirm https://get.activated.win | iex\r\n```\r\n\r\n或\r\n\r\n``` powershell\r\nirm https://massgrave.dev/get | iex\r\n```\r\n\r\n或\r\n\r\n&lt;Button label=\&quot;Microsoft Activation Scripts 下载\&quot; link=\&quot;https://github.com/massgravel/Microsoft-Activation-Scripts/releases\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;PowerShell\&quot;&gt;\r\n        PowerShell 方法只需直接复制粘贴并执行指定命令即可完成操作。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;命令脚本\&quot;&gt;\r\n        只需运行解压后的脚本文件即可。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-cli.webp\&quot;\r\n    alt=\&quot;Microsoft Activation Scripts CLI\&quot;\r\n/&gt;\r\n\r\n**选择激活选项**\r\n\r\n运行脚本后，根据提示选择所需的激活方式完成激活：\r\n\r\n- 按 `1` 激活 Windows（HWID 方法）\r\n- 按 `2` 激活 Office（Ohook 方法）\r\n\r\n&lt;Image \r\n  src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-windows-ji-huo.webp\&quot; \r\n  alt=\&quot;MAS Windows 激活\&quot; \r\n/&gt;\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-office-ji-huo.webp\&quot;\r\n    alt=\&quot;MAS Office 激活\&quot;\r\n/&gt;\r\n\r\nMAS 是一款免费、高效的激活工具，支持 Windows 和 Office 的多种激活方式，操作简单。使用时需注意：确保下载来源安全，硬件变更后可能需要重新激活，部分产品（如 Mac 版 Office）不适用。它是个人和企业用户解决激活问题的便捷选择。\r\n\r\n**参考资料**\r\n\r\n1. [Microsoft Activation Scripts 官网](https://massgrave.dev/)\r\n2. [HWID Activation - MAS](https://massgrave.dev/hwid)\r\n3. [Ohook Activation - MAS](https://massgrave.dev/ohook)\r\n4. [Microsoft Activation Scripts GitHub](https://github.com/massgravel/Microsoft-Activation-Scripts)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/sound-lock&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Sound Lock：音量控制器，PUBG 听声辩位利器&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Sound Lock 是一款适用于 Windows Vista 及以上系统的声音控制软件，能帮助用户控制电脑音量，避免打扰他人。它支持最多 14 个音频通道，允许用户为每个通道和输出设备单独设置音量限制。方便灵活地管理声音输出，提升观影和听音体验。&quot;],&quot;date&quot;:[3,&quot;2025-03-29T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/29/sound-lock.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Sound Lock 是一款适用于 Windows Vista 及以上系统的声音控制软件，能帮助用户控制电脑音量，避免打扰他人。它支持最多 14 个音频通道，允许用户为每个通道和输出设备单独设置音量限制。方便灵活地管理声音输出，提升观影和听音体验。\r\n\r\n## Sound Lock 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Sound Lock 使用教程](https://youtu.be/BrpCKoMiIEA)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Sound Lock 下载\&quot; link=\&quot;https://www.3appes.com/sound-lock/\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载完成后，运行安装文件并按照提示完成安装。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/29/sound-lock-gui.webp\&quot;\r\n    alt=\&quot;Sound Lock 界面\&quot;\r\n/&gt;\r\n\r\n**1. 启动软件**\r\n\r\n安装完成后，打开 Sound Lock 软件，点击 `ON` 按钮启动应用。\r\n\r\n**2. 设置音量限制**\r\n\r\n点击 `Settings` 进入设置界面：\r\n\r\n保持输出设备默认。\r\n\r\n勾选所有输出通道。\r\n\r\n过滤模式设为 `Filter per channel`。\r\n\r\n**3. 自动启动设置**\r\n\r\n勾选 `Launch Sound Lock...` 和 `Automatically enable Sound Lock...` 即可设置软件开机自动运行并自动启用。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/03/29/sound-lock-she-zhi.webp\&quot;\r\n    alt=\&quot;Sound Lock 设置\&quot;\r\n/&gt;\r\n\r\nSound Lock 是一款高效的电脑声音控制软件，可以限制音量，避免打扰他人。它支持为每个音频通道单独设置音量，适合看电影和玩游戏。使用时需正确设置输出设备和通道，保证最佳音质体验，让用户享受舒适的声音环境。\r\n\r\n**参考资料**\r\n\r\n1. [Sound Lock 官网](https://www.3appes.com/sound-lock/)\r\n2. [Sound Lock? : r/PUBATTLEGROUNDS - Reddit](https://www.reddit.com/r/PUBATTLEGROUNDS/comments/c92ynu/sound_lock/)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/upscayl&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Upscayl：图像放大器，免费提升图片画质&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Upscayl 是一款开源的人工智能图像放大工具，能将模糊或低分辨率图片放大成高清晰度图像，同时保持细节和颜色。它适合设计师、创作者及普通用户，用于修复旧照片或提升作品质量。支持 Linux、macOS 和 Windows 系统，需 Vulkan 兼容的显卡。操作简单，支持批量处理和多种模型选择，满足不同需求。&quot;],&quot;date&quot;:[3,&quot;2025-04-19T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/19/upscayl.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Upscayl 是一款开源的人工智能图像放大工具，能将模糊或低分辨率图片放大成高清晰度图像，同时保持细节和颜色。它适合设计师、创作者及普通用户，用于修复旧照片或提升作品质量。支持 Linux、macOS 和 Windows 系统，需 Vulkan 兼容的显卡。\r\n\r\n## Upscayl 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Upscayl 使用教程](https://youtu.be/TiPbsIrSCHM)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Upscayl 下载\&quot; link=\&quot;https://upscayl.org/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n   &lt;Tab name=\&quot;Windows\&quot;&gt; \r\n      双击 `.exe` 文件启动安装，若出现 SmartScreen 警告，选择 `更多信息` 后点击 `仍要运行` 即可完成安装。\r\n   &lt;/Tab&gt;\r\n   &lt;Tab name=\&quot;macOS\&quot;&gt;\r\n      双击 `.dmg` 文件，拖拽 Upscayl 图标到 `应用程序` 文件夹，首次打开时需右键选择 `打开` 以绕过安全提示。\r\n   &lt;/Tab&gt;\r\n   &lt;Tab name=\&quot;Linux\&quot;&gt;\r\n      给予 `.AppImage` 文件执行权限后直接运行，或通过系统包管理器安装对应格式软件包。\r\n   &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/19/upscayl-gui.webp\&quot;\r\n   alt=\&quot;Upscayl 界面\&quot;\r\n/&gt;\r\n\r\n**1. 选择图片**\r\n\r\n点击 `选择图片` 按钮，导入需要放大的图像文件。\r\n\r\n**2. 选择模型**\r\n\r\nUpscayl 提供多种适合照片、数字艺术等风格的 AI 模型，用户也可将自定义模型放入 `models` 文件夹加载，并支持多种放大倍数（如 `2x`、`4x`、最高 `16x`）供选择。\r\n\r\n**3. 选择输出文件夹**\r\n\r\n设定放大后图片的保存路径，方便管理。\r\n\r\n**4. 启动放大**\r\n\r\n点击 `升图` 按钮即可开始处理图片，支持一次批量处理多张图片，提高效率。\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/19/upscayl-tu-xiang-zeng-qiang-hou.webp\&quot;\r\n   alt=\&quot;Upscayl 图像增强后\&quot;\r\n/&gt;\r\n\r\nUpscayl 是一款免费开源的 AI 图像放大工具，能轻松将低分辨率图片变清晰。它支持多平台，但需 Vulkan 兼容的显卡；软件不适合修复完全模糊的图片，使用时应耐心等待批量处理完成；对于不支持 Vulkan 的设备，可尝试社区提供的 CPU 模式或 SwiftShader，但性能有限。建议及时更新软件，确保功能和兼容性。\r\n\r\n**参考资料**\r\n\r\n1. [Upscayl 官网](https://upscayl.org/)\r\n2. [Upscayl GitHub](https://github.com/upscayl/upscayl)\r\n3. [upscayl/upscayl Wiki - GitHub](https://github.com/upscayl/upscayl/wiki)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/05/folo&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Folo：RSS 阅读器，轻松玩转信息聚合&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Folo 是一款智能信息聚合工具，支持订阅 1200 多个网站和社交平台的内容，提供清爽无干扰的时间线。它帮助用户高效管理新闻、博客和社交动态，支持跨平台同步，具备AI自动摘要和翻译功能。Folo 支持 Windows、macOS、Linux 桌面，iOS、Android 移动端和网页版，方便多设备使用。&quot;],&quot;date&quot;:[3,&quot;2025-05-24T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/05/24/folo.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;新闻&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Folo 是一款智能信息聚合工具，支持订阅 1200 多个网站和社交平台的内容，提供清爽无干扰的时间线。它帮助用户高效管理新闻、博客和社交动态，支持跨平台同步，具备AI自动摘要和翻译功能。Folo 支持 Windows、macOS、Linux 桌面，iOS、Android 移动端和网页版，方便多设备使用。\r\n\r\n## Folo 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Folo 使用教程](https://youtu.be/ympM05ngoCE)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Folo 下载\&quot; link=\&quot;https://follow.is/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n   &lt;Tab name=\&quot;桌面端\&quot;&gt; \r\n      下载对应平台的安装包，双击运行并按提示完成安装，启动应用后注册或登录账号即可开始使用。\r\n   &lt;/Tab&gt;\r\n   &lt;Tab name=\&quot;移动端\&quot;&gt;\r\n      通过应用商店下载安装后，打开应用并登录账号，首次登录时可同步已有订阅和阅读进度。\r\n   &lt;/Tab&gt;\r\n   &lt;Tab name=\&quot;网页端\&quot;&gt;\r\n      无需安装，直接登录账号即可使用全部基础功能。\r\n   &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-gui.webp\&quot;\r\n   alt=\&quot;Folo 界面\&quot;\r\n/&gt;\r\n\r\n**1. 账号注册与登录**\r\n\r\n注册账号后，登录 Folo 即可同步订阅源和阅读进度，实现多端无缝衔接。\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-zhu-ce.webp\&quot;\r\n   alt=\&quot;Folo 注册\&quot;\r\n/&gt;\r\n\r\n**2. 订阅内容**\r\n\r\n- Folo 支持订阅 RSS、微博、X、B 站、小红书、YouTube 等多种内容\r\n- 用户可以导入他人分享的订阅列表，也能自定义添加订阅源\r\n- 订阅内容可分类管理，支持自定义标签和文件夹，方便整理和查找信息，提升使用效率\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-fa-xian.webp\&quot;\r\n   alt=\&quot;Folo 发现\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;更多订阅请移步《[RSSHub 热门订阅](https://docs.rsshub.app/zh/routes/popular)》。&lt;/Notice&gt;\r\n\r\n**3. 内容浏览**\r\n\r\n- Folo 提供多种阅读模式，包括双栏、画廊和视频播放，提升浏览体验\r\n- 支持自动排版、纯净模式和语音朗读，让阅读更舒适\r\n- AI 功能能自动生成摘要、翻译内容和总结热点，帮助用户快速抓住重要信息\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-wen-zhang-liu-lan.webp\&quot;\r\n   alt=\&quot;Folo 文章浏览\&quot;\r\n/&gt;\r\n\r\n**4. 通知和过滤**\r\n\r\n- Folo 支持新内容通知，帮助用户及时了解订阅更新\r\n- 用户可以屏蔽不感兴趣的内容，自动标记已读，减少干扰\r\n- 还可自定义规则，替换标题或内容中的特定文字，满足个性化需求，提升使用体验\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-bian-ji-ding-yue-yuan.webp\&quot;\r\n   alt=\&quot;Folo 编辑订阅源\&quot;\r\n/&gt;\r\n\r\n**5. 社区与打赏**\r\n\r\n- 用户可以分享自己的订阅列表，方便他人一键订阅并发现社区精选内容\r\n- 通过 $POWER 代币，读者能即时打赏支持喜欢的内容创作者，激励优质内容产出\r\n- 创作者还能认领内容源，获得经济回报，促进良性互动和内容生态发展\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-power.webp\&quot;\r\n   alt=\&quot;Folo Power\&quot;\r\n/&gt;\r\n\r\n**6. 快捷键与高级功能**\r\n\r\nFolo 提供丰富快捷键，帮助用户快速操作提升效率，同时支持 API 和 Webhook，方便高级用户和开发者实现自动化和个性化设置，满足多样需求。\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/05/24/folo-zi-dong-hua.webp\&quot;\r\n   alt=\&quot;Folo 自动化\&quot;\r\n/&gt;\r\n\r\nFolo 是一款多平台信息聚合工具，利用 AI 和社区模式帮助用户高效管理信息，实现价值共享。部分海外内容访问可能不稳定，建议合理使用科学上网。用户需注意隐私安全，避免订阅不明来源内容。\r\n\r\n**参考资料**\r\n\r\n1. [Folo 官网](https://follow.is/)\r\n2. [Folo GitHub](https://github.com/RSSNext/Folo)\r\n3. [RSSNext/Folo Wiki - GitHub](https://github.com/RSSNext/Folo/wiki)\r\n4. [Follow 软件的使用入门教程 - CSDN 博客](https://blog.csdn.net/qq_45675378/article/details/143573066)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/real-esrgan&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Real-ESRGAN：图片修复工具，AI 提升图像清晰度&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Real-ESRGAN 是一款基于人工智能的图像和视频超分辨率修复工具，专注于提升现实世界中图像的清晰度和细节表现。它不仅支持普通照片的放大和修复，还针对动漫视频和插画提供了专门优化的模型，适合图像修复、动漫视频增强、老旧照片修复等多种应用场景。Real-ESRGAN 支持 Windows、Linux 和 macOS 等主流系统平台，且提供了跨平台的可执行文件和图形用户界面，方便不同用户群体使用。&quot;],&quot;date&quot;:[3,&quot;2025-04-14T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/15/real-esrgan.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Real-ESRGAN 是一款基于人工智能的图像和视频超分辨率修复工具，专注于提升现实世界中图像的清晰度和细节表现。它不仅支持普通照片的放大和修复，还针对动漫视频和插画提供了专门优化的模型，适合图像修复、动漫视频增强、老旧照片修复等多种应用场景。Real-ESRGAN 支持 Windows、Linux 和 macOS 等主流系统平台，且提供了跨平台的可执行文件和图形用户界面，方便不同用户群体使用。\r\n\r\n## Real-ESRGAN 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Real-ESRGAN 使用教程](https://youtu.be/TYLZB24PZyw)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Real-ESRGAN 下载\&quot; link=\&quot;https://github.com/xinntao/Real-ESRGAN/releases\&quot; style=\&quot;solid\&quot; /&gt;\r\n&lt;Button label=\&quot;FFmpeg 下载\&quot; link=\&quot;https://ffmpeg.org/download.html\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;Real-ESRGAN\&quot;&gt;\r\n        下载完成后，将压缩包解压到指定文件夹。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;FFmpeg\&quot;&gt;\r\n        访问 FFmpeg 官网下载安装包。\r\n        解压后将 `bin` 文件夹路径添加到环境变量 `Path`。\r\n        最后在命令行输入 `ffmpeg -version` 确认安装成功。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/15/real-esrgan-preview.webp\&quot;\r\n   alt=\&quot;Real-ESRGAN 图像修复预览\&quot;\r\n/&gt;\r\n\r\n**图像超分辨率**\r\n\r\n通过命令行进入可执行文件所在目录，执行命令示例：\r\n\r\n```powershell\r\nrealesrgan-ncnn-vulkan.exe -i input.jpg -o output.png -n realesrgan-x4plus\r\n```\r\n\r\n其中：\r\n\r\n-i：输入图像。\r\n\r\n-o：输出文件。\r\n\r\n-n：模型名称（默认为 realesrgan-x4plus，也可选择动漫优化模型等）。\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;更多模型请移步《[Real-ESRGAN 模型库](https://github.com/xinntao/Real-ESRGAN/blob/master/docs/model_zoo.md)》。&lt;/Notice&gt;\r\n\r\n**视频超分辨率**\r\n\r\n**1. 使用 FFmpeg 提取视频帧**\r\n\r\n提前创建文件夹如 `tmp_frames`。\r\n\r\n```powershell\r\nffmpeg -i onepiece_demo.mp4 -qscale:v 1 -qmin 1 -qmax 1 -vsync 0 tmp_frames/frame%08d.png\r\n```\r\n\r\n**2. 使用 Real-ESRGAN 执行文件进行推理**\r\n\r\n以 Windows 系统为例，提前创建文件夹如 `out_frames`。\r\n\r\n```powershell\r\nrealesrgan-ncnn-vulkan.exe -i tmp_frames -o out_frames -n realesr-animevideov3 -s 2 -f jpg\r\n```\r\n\r\n**3. 将增强后的帧重新编码成视频**\r\n\r\n首先从输入视频中获得 FPS：\r\n\r\n```powershell\r\nffmpeg -i onepiece_demo.mp4\r\n```\r\n\r\n您将得到类似于以下屏幕截图的输出。\r\n\r\n&lt;Image \r\n   src=\&quot;/images/posts/2025/04/15/real-esrgan-huo-qu-shi-pin-fps.webp\&quot;\r\n   alt=\&quot;Real-ESRGAN 获取视频 FPS\&quot;\r\n/&gt;\r\n\r\n合并视频：\r\n\r\n```powershell\r\nffmpeg -r 23.98 -i out_frames/frame%08d.jpg -c:v libx264 -r 23.98 -pix_fmt yuv420p output.mp4\r\n```\r\n\r\n如果您还想保留原始音频，可以使用以下命令：\r\n\r\n```powershell\r\nffmpeg -r 23.98 -i out_frames/frame%08d.jpg -i onepiece_demo.mp4 -map 0:v:0 -map 1:a:0 -c:a copy -c:v libx264 -r 23.98 -pix_fmt yuv420p output_w_audio.mp4\r\n```\r\n\r\n&lt;Notice type=\&quot;info\&quot;&gt;你需要替换与原视频相同的 FPS。&lt;/Notice&gt;\r\n\r\nReal-ESRGAN 作为一款实用的图像和视频超分辨率工具，极大地提升了图像细节和清晰度，适用于照片修复、动漫视频放大、老旧影像修复等多种场景。其跨平台的可执行文件和图形界面降低了使用门槛，支持多种模型和自定义微调，满足不同用户需求。使用时需注意选择合适的模型和放大倍数，视频处理需配合 FFmpeg 等工具。\r\n\r\n**参考资料**\r\n\r\n1. [Real-ESRGAN GitHub](https://github.com/xinntao/Real-ESRGAN)\r\n2. [Real-ESRGAN 动漫视频模型介绍 - GitHub](https://github.com/xinntao/Real-ESRGAN/blob/master/docs/anime_video_model.md)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/06&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;2025 年 6 月每日《软件推荐》&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;&quot;],&quot;date&quot;:[3,&quot;2025-06-22T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/06/ruan-jian-tui-jian.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;新闻&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Mark Dinn&quot;]]],&quot;tags&quot;:[1,[[0,&quot;每日推荐&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;2025 年 6 月每日软件推荐，在这里发现最新、热门的开源软件吧。\r\n\r\n## 每日软件推荐\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;持续更新中……&lt;/Notice&gt;\r\n\r\n### 2025 年 6 月 22 日\r\n\r\n[**Typst**](https://typst.app/) &lt;Badge 下载无水印视频或图集。\r\n\r\n### 2025 年 6 月 18 日\r\n\r\n[**SimpleMindMap**](https://wanglin2.github.io/mind-map-docs/)（思绪思维导图）&lt;Badge type=\&quot;warning\&quot; text=\&quot;Web\&quot; /&gt; &lt;Badge type=\&quot;info\&quot; text=\&quot;桌面端\&quot; /&gt; &lt;Badge type=\&quot;error\&quot; text=\&quot;扩展程序\&quot; /&gt;\r\n\r\n简单而强大的 Web 思维导图库和思维导图软件。\r\n\r\n[**DataBackup**](https://databackupofficial.github.io/zh/)（数据备份）&lt;Badge type=\&quot;tip\&quot; text=\&quot;Android\&quot; /&gt;\r\n\r\n免费开源的数据备份应用程序。\r\n\r\n[**N_m3u8DL-RE**](https://github.com/nilaoda/N_m3u8DL-RE) &lt;Badge type=\&quot;tip\&quot; text=\&quot;Android\&quot; /&gt; &lt;Badge type=\&quot;info\&quot; text=\&quot;桌面端\&quot; /&gt;\r\n\r\n跨平台的 DASH/HLS/MSS 下载工具。\r\n\r\n### 2025 年 6 月 17 日\r\n\r\n[**EhViewer**](https://github.com/xiaojieonly/Ehviewer_CN_SXJ) &lt;Badge type=\&quot;tip\&quot; text=\&quot;Android\&quot; /&gt;\r\n\r\nE-Hentai Android 平台的浏览器应用程序，提供了浏览、下载和管理 E-Hentai 内容的功能。\r\n\r\n[**LunaTranslator**](https://docs.lunatranslator.org/zh/) &lt;Badge type=\&quot;info\&quot; text=\&quot;Windows\&quot; /&gt;\r\n\r\n一款 Galgame 翻译器，提供了丰富的功能支持，包括文本输入、OCR、剪贴板、语音识别、文件翻译等。\r\n\r\n[**Bili23 Downloader**](https://bili23.scott-sloan.cn/) &lt;Badge type=\&quot;info\&quot; text=\&quot;桌面端\&quot; /&gt;\r\n\r\n跨平台的 B 站视频下载工具，能够下载 B 站上的视频、番剧、电影和纪录片等资源。\r\n\r\n### 2025 年 6 月 16 日\r\n\r\n[**JDownloader**](https://jdownloader.org/)\r\n\r\n免费开源的下载工具，能自动识别下载链接，批量管理下载任务，支持暂停、恢复和限速，还能自动解压文件。\r\n\r\n[**mousemaster**](https://github.com/petoncle/mousemaster)\r\n\r\n基于键盘的鼠标控制工具，仅使用键盘就可以控制鼠标光标。\r\n\r\n[**RapidOCR**](https://github.com/RapidAI/RapidOCR)\r\n\r\n百度的开源免费的 OCR 工具，支持多平台和离线使用，能快速识别中文和英文，速度比传统 PaddleOCR 快很多。\r\n\r\n### 2025 年 6 月 15 日\r\n\r\n[**Oomol Studio**](https://oomol.com/zh-CN/)\r\n\r\n面向开发者和数据科学家的 AI 工作流平台，支持 Windows x64 系统。\r\n\r\n[**Catima**](https://catima.app/)\r\n\r\n免费且开源的 Android 会员卡和票务管理工具，无需联网，无广告，不追踪用户数据。\r\n\r\n[**nb**](https://xwmx.github.io/nb/)\r\n\r\n支持命令行和本地网页的笔记、书签和知识库管理工具。\r\n\r\n### 2025 年 6 月 14 日\r\n\r\n[**沉浸式翻译**](https://immersivetranslate.com/zh-Hans/)\r\n\r\n免费且功能强大的双语网页翻译插件，支持网页、PDF、EPUB 电子书和视频字幕等多种格式。\r\n\r\n[**YouTube Transcript API**](https://github.com/jdepoix/youtube-transcript-api)\r\n\r\n开源的 Python API，用于获取 YouTube 视频字幕。\r\n\r\n[**OpenCalc**](https://github.com/clementwzk/OpenCalc)\r\n\r\n轻量级、无广告的开源安卓科学计算器，支持基本运算、幂、阶乘、三角函数等多种功能。\r\n\r\n### 2025 年 6 月 13 日\r\n\r\n[**clawPDF**](https://github.com/clawsoftware/clawPDF)\r\n\r\n开源的 Windows 虚拟打印机软件，支持将文档和图片转换为多种格式。\r\n\r\n[**Chili3D**](https://chili3d.com/)\r\n\r\n开源的基于浏览器的 3D CAD 应用，可实现高性能在线建模和编辑。\r\n\r\n[**GitHub520**](https://github.com/521xueweihan/GitHub520)\r\n\r\n该项目通过修改本地 hosts 文件，解决了国内访问 GitHub 速度慢和图片加载异常的问题。\r\n\r\n### 2025 年 6 月 12 日\r\n\r\n[**Travel Scan**](https://play.google.com/store/apps/details?id=com.travelscan.app)\r\n\r\n智能旅行规划应用。\r\n\r\n[**Microsoft Edit**](https://github.com/microsoft/edit)（微软编辑器）\r\n\r\n简洁易用的文本编辑器，结合经典 MS-DOS 设计和现代界面，适合初学者和程序员使用。\r\n\r\n[**团子翻译器**](https://translator.dango.cloud/)\r\n\r\n基于 OCR 技术的 Windows 软件，支持实时屏幕区域和图片文字翻译。\r\n\r\n### 2025 年 6 月 11 日\r\n\r\n[**Seelen UI**](https://seelen.io/zh)\r\n\r\n专为 Windows 10/11 设计的桌面定制工具，支持自定义菜单、小工具、主题和图标，内置平铺窗口管理器，提升多任务效率。\r\n\r\n[**Quarkdown**](https://quarkdown.com/)\r\n\r\n基于 Markdown 的现代排版系统，结合了 Markdown 简洁和 LaTeX 强大功能，支持生成书籍、演示文稿和多种格式文档。\r\n\r\n[**BaiduPCS-Go**](https://github.com/qjfoidnh/BaiduPCS-Go)\r\n\r\n支持多平台的百度网盘命令行工具，能上传、下载、分享和转存文件。\r\n\r\n### 2025 年 6 月 10 日\r\n\r\n[**Google AI Edge Gallery**](https://github.com/google-ai-edge/gallery)\r\n\r\n谷歌推出的实验性应用，支持在 Android 设备上离线运行生成式 AI 模型。\r\n\r\n[**new.website**](https://new.website/)\r\n\r\n基于 AI 的网站建设平台，通过简单描述即可快速生成网站草案，并用编辑器个性化调整。\r\n\r\n[**BV**](https://github.com/aaa1115910/bv)（Bug Video）\r\n\r\n专为 Android 5.0 及以上设备设计的第三方哔哩哔哩客户端，采用 Kotlin 和 Jetpack Compose 开发。\r\n\r\n### 2025 年 6 月 9 日\r\n\r\n[**Chrono**](https://github.com/vicolo-dev/chrono)\r\n\r\n适用于 Android 的多功能时钟应用，集时钟、闹钟、计时器和秒表于一体。\r\n\r\n[**Zeno**](https://youzeno.com/)\r\n\r\n基于 AI 的 YouTube 视频内容管理平台，能将视频提炼成八张行动卡片，帮助用户快速获取关键见解和实用步骤。\r\n\r\n[**MusicFree**](https://musicfree.catcat.work/)\r\n\r\n免费开源的本地音乐播放器，支持通过插件自定义音乐源，实现个性化播放。\r\n\r\n### 2025 年 6 月 8 日\r\n\r\n[**SmartSystemMenu**](https://github.com/AlexanderPro/SmartSystemMenu)\r\n\r\n专为 Windows 设计的免费工具，能在窗口系统菜单中添加多种实用功能，如窗口置顶、透明度调整、大小移动和截图保存。\r\n\r\n[**TikTokDownloader**](https://github.com/JoeanAmier/TikTokDownloader)\r\n\r\n支持批量下载抖音和 TikTok 的视频、图集、直播及相关数据的一款开源工具。\r\n\r\n[**YouTube Music Desktop App**](https://th-ch.github.io/youtube-music/)\r\n\r\n开源跨平台桌面应用，支持 Windows、macOS 和 Linux。\r\n\r\n### 2025 年 6 月 7 日\r\n\r\n[**Whisk**](https://labs.google/fx/zh/tools/whisk)\r\n\r\nGoogle Labs 推出的在线 AI 图像生成工具，只需上传最多三张图片作为创作参考，系统自动生成符合风格和主题的图片，无需复杂文字提示。\r\n\r\n[**RustDesk**](https://rustdesk.com/zh-cn/)\r\n\r\n开源远程桌面软件，支持 Windows、macOS、Linux、Android 和 Web 平台。\r\n\r\n[**VirtualBox**](https://www.virtualbox.org/)\r\n\r\nOracle 支持的免费开源虚拟机软件，支持 Windows、Linux、macOS 等多种系统。\r\n\r\n### 2025 年 6 月 6 日\r\n\r\n[**Saner.AI**](https://www.saner.ai/)\r\n\r\n专为注意力缺陷多动症患者设计的人工智能生产力工具，帮助用户高效管理笔记、任务和日程。\r\n\r\n[**ReDo Tasks**](https://fizbyte.com/redo/)\r\n\r\n简洁直观的任务管理工具，专为周期性重复任务设计，如定期更换牙刷或猫砂。\r\n\r\n[**Cat Catch**](https://github.com/xifangczy/cat-catch)（猫抓）\r\n\r\n支持 Chrome、Edge、Firefox 等浏览器的资源嗅探扩展，能帮助用户快速抓取网页中的图片、视频等资源。&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/umi-ocr&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Umi-OCR：文字识别工具，轻松提取文档文本&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Umi-OCR 是一款免费开源的离线文字识别软件，支持多语言和批量识别图片、PDF，能去除水印并识别或生成二维码。它适用于文档数字化、截图文字提取、自动化数据录入等场景。支持 Windows 和 Linux 系统，并提供命令行和 HTTP 接口，方便集成和自动化使用。&quot;],&quot;date&quot;:[3,&quot;2025-04-22T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/22/umi-ocr.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Umi-OCR 是一款免费开源的离线文字识别软件，支持多语言和批量识别图片、PDF，能去除水印并识别或生成二维码。它适用于文档数字化、截图文字提取、自动化数据录入等场景。支持 Windows 和 Linux 系统，并提供命令行和 HTTP 接口，方便集成和自动化使用。\r\n\r\n## Umi-OCR 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[Umi-OCR 使用教程](https://youtu.be/jCkAg3s-BMo)》。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Umi-OCR 下载\&quot; link=\&quot;https://github.com/hiroi-sora/Umi-OCR/releases\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n   &lt;Tab name=\&quot;Windows\&quot;&gt;\r\n      解压软件包，无需安装，直接双击 `Umi-OCR.exe` 启动。\r\n   &lt;/Tab&gt;\r\n   &lt;Tab name=\&quot;Linux\&quot;&gt;\r\n      Linux 用户可运行 `umi-ocr.sh` 脚本启动。\r\n   &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-gui.webp\&quot;\r\n   alt=\&quot;Umi-OCR 界面\&quot;\r\n/&gt;\r\n\r\n**截图 OCR**\r\n\r\n- 通过快捷键或界面按钮，快速截图识别图片中的文字\r\n- 支持复制、编辑识别结果，支持多条识别历史记录管理\r\n- 可粘贴图片到软件窗口直接识别\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-jie-tu-ocr.webp\&quot;\r\n   alt=\&quot;Umi-OCR 截图 OCR\&quot;\r\n/&gt;\r\n\r\n**批量 OCR**\r\n\r\n- 支持批量导入本地图片（jpg、png、webp 等格式），一次性识别大量文件\r\n- 识别结果可导出为 txt、csv、jsonl、md 等格式\r\n- 支持“忽略区域”设置，排除水印、LOGO 等干扰内容\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-pi-liang-ocr.webp\&quot;\r\n   alt=\&quot;Umi-OCR 批量 OCR\&quot;\r\n/&gt;\r\n\r\n**文档识别**\r\n\r\n- 支持 PDF、xps、epub、mobi 等格式文档的 OCR 识别\r\n- 可输出为双层可搜索 PDF，便于后续检索\r\n- 支持设置忽略区域，自动关机/休眠等任务选项\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-pi-liang-wen-dang.webp\&quot;\r\n   alt=\&quot;Umi-OCR 批量文档\&quot;\r\n/&gt;\r\n\r\n**二维码功能**\r\n\r\n- 支持识别图片中的二维码、条形码（19 种协议）\r\n- 支持输入文本生成二维码图片，支持纠错等级设置\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-er-wei-ma.webp\&quot;\r\n   alt=\&quot;Umi-OCR 二维码\&quot;\r\n/&gt;\r\n\r\n**全局设置与高级用法**\r\n\r\n- 支持多语言界面、主题切换、快捷方式添加、开机自启等\r\n- 支持命令行和 HTTP 接口，便于开发者二次集成和自动化调用\r\n- 可切换不同 OCR 引擎插件，满足不同性能和兼容性需求\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/22/umi-ocr-quan-ju-she-zhi.webp\&quot;\r\n   alt=\&quot;Umi-OCR 全局设置\&quot;\r\n/&gt;\r\n\r\nUmi-OCR 功能丰富，支持截图、批量、文档和二维码等文字识别，操作简单，适合高效提取和管理文本。首次运行如遇报错，可按提示解决。建议关注官方更新，不要同时安装不同引擎版本，软件永久免费，欢迎参与社区反馈和翻译。\r\n\r\n**参考资料**\r\n\r\n1. [Umi-OCR GitHub](https://github.com/hiroi-sora/Umi-OCR)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/05/lx-music&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;LX Music：音乐搜索器，免费畅享全网音乐&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;随着数字音乐的普及，越来越多的用户希望能够方便快捷地收听和管理自己喜欢的音乐。LX Music（洛雪音乐助手）作为一款免费开源的音乐播放软件，凭借其强大的功能和跨平台支持，成为了许多音乐爱好者的首选。它不仅支持 Windows、Mac、Linux 等主流桌面系统，还提供 Android 移动端版本，满足不同用户的使用需求。&quot;],&quot;date&quot;:[3,&quot;2025-05-31T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/05/31/lx-music.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;音乐&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;随着数字音乐的普及，越来越多的用户希望能够方便快捷地收听和管理自己喜欢的音乐。LX Music（洛雪音乐助手）作为一款免费开源的音乐播放软件，凭借其强大的功能和跨平台支持，成为了许多音乐爱好者的首选。它不仅支持 Windows、Mac、Linux 等主流桌面系统，还提供 Android 移动端版本，满足不同用户的使用需求。\r\n\r\n## LX Music 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;视频教程请移步 YouTube 观看《[LX Music 使用教程](https://youtu.be/rtr1VT37i_o)》。&lt;/Notice&gt;\r\n\r\n## 下载\r\n\r\n&lt;Button label=\&quot;LX Music 下载\&quot; link=\&quot;https://lxmusic.toside.cn/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n## 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;Windows\&quot;&gt;\r\n        建议运行安装程序时选择 `仅为我安装`。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;macOS\&quot;&gt;\r\n        双击打开并将应用图标拖入 `应用程序` 文件夹。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;Linux\&quot;&gt;\r\n        需赋予其执行权限（如使用 `chmod` 命令）。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;Android\&quot;&gt;\r\n        打开手机 `设置` 允许安装未知来源应用。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n## 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/05/31/lx-music-gui.webp\&quot;\r\n    alt=\&quot;LX Music 界面\&quot;\r\n/&gt;\r\n\r\n**1. 导入自定义音源**\r\n\r\nLX Music 默认不内置音乐源，需要导入自定义音源 JS 脚本：\r\n\r\n打开软件，进入 `设置` &gt; `基本设置` &gt; `自定义源` &gt; `自定义源管理`。\r\n\r\n选择 `在线导入` 或 `本地导入`，导入音源脚本。\r\n\r\n选择导入的音源，等待“初始化成功”提示。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/05/31/lx-music-zi-ding-yi-yuan.gif\&quot;\r\n    alt=\&quot;LX Music 自定义源\&quot;\r\n/&gt;\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;更多音源请移步《[洛雪音乐源](https://github.com/pdone/lx-music-source)》。&lt;/Notice&gt;\r\n\r\n**2. 搜索与播放音乐**\r\n\r\n在搜索框输入歌曲名、歌手或专辑名；选择搜索结果，点击播放即可。\r\n\r\n支持 VIP 歌曲免费试听；支持无损音质：\r\n\r\n进入 `设置` &gt; `播放设置` &gt; `优先播放的音质`。\r\n\r\n选择 `flac` 或 `flac24bit`。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/05/31/lx-music-yin-zhi-she-zhi.gif\&quot;\r\n    alt=\&quot;LX Music 音质设置\&quot;\r\n/&gt;\r\n\r\n**3. 启用下载功能**\r\n\r\n进入`设置` &gt; `下载设置`，勾选 `启用下载功能`。\r\n\r\n启用后，回到主界面，搜索你想下载的歌曲。\r\n\r\n在歌曲列表中，右键点击需要下载的歌曲，选择 `下载` 即可开始下载。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/05/31/lx-music-xia-zai-she-zhi.gif\&quot;\r\n    alt=\&quot;LX Music 下载设置\&quot;\r\n/&gt;\r\n\r\n通过以上步骤，您可以轻松安装并使用 LX Music，享受全网免费无损音乐资源。LX Music 不仅功能丰富，还支持多平台使用，满足不同用户的需求。使用时请注意导入有效的自定义音源，确保音乐搜索和下载功能正常；同时，保持软件更新，以获得更好的体验和更多新功能。\r\n\r\n**参考资料**\r\n\r\n1. [LX Music 官网](https://lxmusic.toside.cn/)\r\n2. [LX Music 桌面版 GitHub](https://github.com/lyswhut/lx-music-desktop)\r\n3. [LX Music 桌面版说明 - LX Music](https://lxmusic.toside.cn/desktop)\r\n4. [常见问题 - LX Music](https://lxmusic.toside.cn/desktop/faq)\r\n5. [洛雪音乐助手下载与使用_lxmusic - CSDN 博客](https://blog.csdn.net/qq_44139306/article/details/135816971)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/06/localsend&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;LocalSend：文件传输工具，轻松玩转多端互传&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;LocalSend 是一款免费开源的跨平台文件分享工具，支持点对点传输，无需中央服务器。适合办公室和家庭快速分享文件。支持 Windows、macOS、Linux、Android 和 iOS 系统，方便不同设备间安全传输。&quot;],&quot;date&quot;:[3,&quot;2025-06-07T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/06/07/localsend.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;LocalSend 是一款免费开源的跨平台文件分享工具，支持点对点传输，无需中央服务器。适合办公室和家庭快速分享文件。支持 Windows、macOS、Linux、Android 和 iOS 系统，方便不同设备间安全传输。\r\n\r\n## LocalSend 使用教程\r\n\r\n&lt;Notice type=\&quot;tip\&quot;&gt;~~视频教程请移步 YouTube 观看《[LocalSend 使用教程]()》。~~&lt;/Notice&gt;\r\n\r\n## 下载\r\n\r\n&lt;Button label=\&quot;LocalSend 下载\&quot; link=\&quot;https://localsend.org/zh-CN/download\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n## 安装\r\n\r\n&lt;Tabs client:load&gt;\r\n    &lt;Tab name=\&quot;桌面端\&quot;&gt;\r\n        下载对应系统的安装包（`.exe`、`.dmg`、`.AppImage` 等）。\r\n        双击运行安装程序，按照提示完成安装。\r\n    &lt;/Tab&gt;\r\n    &lt;Tab name=\&quot;移动端\&quot;&gt;\r\n        通过应用商店下载安装，安装过程自动完成。\r\n    &lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n## 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/06/07/localsend-gui.webp\&quot;\r\n    alt=\&quot;LocalSend 界面\&quot;\r\n/&gt;\r\n\r\n**1. 发送文件**\r\n\r\n打开 LocalSend，点击 `发送` 按钮。\r\n\r\n选择需要分享的文件或文件夹。\r\n\r\n选择目标设备（自动发现的设备列表中选择）。\r\n\r\n确认发送，文件开始传输。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/06/07/localsend-fa-song.webp\&quot;\r\n    alt=\&quot;LocalSend 发送\&quot;\r\n/&gt;\r\n\r\n**2. 接收文件**\r\n\r\n目标设备上 LocalSend 会弹出接收请求提示。\r\n\r\n用户确认接收后，文件自动下载到预设目录。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/06/07/localsend-jie-shou.webp\&quot;\r\n    alt=\&quot;LocalSend 接收\&quot;\r\n/&gt;\r\n\r\n**3. 消息传递**\r\n\r\n除了文件分享，LocalSend 也支持局域网内的消息发送，方便快速沟通。\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/06/07/localsend-xiao-xi-fa-song.webp\&quot;\r\n    alt=\&quot;LocalSend 消息发送\&quot;\r\n/&gt;\r\n\r\nLocalSend 是一款安全、去中心化的多平台文件分享工具，无需互联网即可快速传输文件。使用时确保设备在同一局域网，传大文件时网络要稳定。现在就下载体验 LocalSend，享受安全便捷的文件分享，欢迎加入开源社区，共同推动软件发展。\r\n\r\n**参考资料**\r\n\r\n1. [LocalSend 官网](https://localsend.org/zh-CN)\r\n2. [LocalSend GitHub](https://github.com/localsend/localsend)&quot;]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;SearchBar&quot;,&quot;value&quot;:true}" await-children><div class="min-h-[45vh]"><input class="form-input w-full text-center" placeholder="在此输入搜索文章" type="text" autoComplete="off" autofocus="" name="search" value=""/><div class="row"></div></div><!--astro:end--></astro-island> </div> </section>  </main> <footer class="section bg-theme-dark"> <div class="container text-center">  <ul class="mb-8 space-x-4"> <li class="inline-block"> <a href="/about" class="p-4 text-white/75 hover:text-white transition-all"> 关于我们 </a> </li><li class="inline-block"> <a href="/contact" class="p-4 text-white/75 hover:text-white transition-all"> 联系我们 </a> </li><li class="inline-block"> <a href="/privacy-policy" class="p-4 text-white/75 hover:text-white transition-all"> 隐私权政策 </a> </li> </ul>  <ul class="social-icons mb-8">     <li class="inline-block"> <a aria-label="youtube" href="https://www.youtube.com/@xszn_org" target="_blank" rel="noopener noreferrer nofollow"> <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M508.64 148.79c0-45-33.1-81.2-74-81.2C379.24 65 322.74 64 265 64h-18c-57.6 0-114.2 1-169.6 3.6C36.6 67.6 3.5 104 3.5 149 1 184.59-.06 220.19 0 255.79q-.15 53.4 3.4 106.9c0 45 33.1 81.5 73.9 81.5 58.2 2.7 117.9 3.9 178.6 3.8q91.2.3 178.6-3.8c40.9 0 74-36.5 74-81.5 2.4-35.7 3.5-71.3 3.4-107q.34-53.4-3.26-106.9zM207 353.89v-196.5l145 98.2z"></path></svg> </a> </li>                           <li class="inline-block"> <a aria-label="location" href="https://t.me/xszn_org" target="_blank" rel="noopener noreferrer nofollow"> <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 496 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M248 8C111 8 0 119 0 256s111 248 248 248 248-111 248-248S385 8 248 8zm121.8 169.9l-40.7
