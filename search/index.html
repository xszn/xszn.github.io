ges/posts/2025/03/20/buster-tian-jia-kuo-zhan.webp)](/images/posts/2025/03/20/buster-tian-jia-kuo-zhan.webp)\r\n\r\n### 使用扩展\r\n\r\n当遇到验证码时，点击验证码附近的扩展程序图标。如以下示例：\r\n\r\n以下是图片验证码识别示例图。\r\n\r\n[![Buster 使用扩展-图片](/images/posts/2025/03/20/buster-shi-yong-kuo-zhan-tu-pian.webp)](/images/posts/2025/03/20/buster-shi-yong-kuo-zhan-tu-pian.webp)\r\n\r\n以下是音频验证码识别示例图。\r\n\r\n[![Buster 使用扩展-音频](/images/posts/2025/03/20/buster-shi-yong-kuo-zhan-yin-pin.webp)](/images/posts/2025/03/20/buster-shi-yong-kuo-zhan-yin-pin.webp)\r\n\r\n如果自动解决失败，您还可以选择人工解决方案以继续。\r\n\r\n&lt;Notice type=\&quot;info\&quot;&gt;如果你遇到 APl quota exceeded（APl 配额已超出）……请点击最左边的“刷新”按钮，再重试。&lt;/Notice&gt;\r\n\r\n### 高级配置（可选）\r\n\r\n为了提高成功率，我们可以安装客户端应用程序，并与扩展程序集成。从该 [GitHub 仓库](https://github.com/dessant/buster-client)下载 App。\r\n\r\nBuster 支持文字、图片和音频验证码，并通过自动化工具和客户端应用程序提高解决成功率。同时，这款工具注重隐私保护，不记录用户个人信息。无论是普通用户还是开发者，Buster 都能带来更流畅的上网体验。\r\n\r\n**参考资料**\r\n\r\n1. [dessant/buster: Captcha solver extension for humans, available for Chrome, Edge and Firefox - GitHub][1]\r\n2. [Home · dessant/buster Wiki - GitHub][2]\r\n3. [Buster: Captcha Solver for Humans - Chrome 应用商店][3]\r\n\r\n[1]: https://github.com/dessant/buster\r\n[2]: https://github.com/dessant/buster/wiki\r\n[3]: https://chromewebstore.google.com/detail/buster-captcha-solver-for/mpbjkejclgfgadiemmefgebjfooflfhl&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/clash-verge-rev&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Clash Verge Rev：代理软件推荐，解锁网络自由神器&quot;],&quot;meta_title&quot;:[0,&quot;Clash Verge Rev：代理软件推荐，解锁网络自由神器&quot;],&quot;description&quot;:[0,&quot;Clash Verge 是一个帮你科学上网的工具，界面好看又好用，支持 Windows、macOS 和 Linux。它内置了 Clash.Meta 内核，还能切换成 `Alpha` 版本内核。不管你是新手还是老手，都能轻松上手。下面我就用最简单的方式，教你如何用 Clash Verge。&quot;],&quot;date&quot;:[3,&quot;2025-03-23T06:36:47.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/23/clash-verge-rev.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;科学上网&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Mark Dinn&quot;]]],&quot;tags&quot;:[1,[[0,&quot;代理软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Clash Verge 是一个帮你科学上网的工具，界面好看又好用，支持 Windows、macOS 和 Linux。它内置了 Clash.Meta 内核，还能切换成 `Alpha` 版本内核。不管你是新手还是老手，都能轻松上手。下面我就用最简单的方式，教你如何用 Clash Verge。\r\n\r\n## Clash Verge Rev 使用教程\r\n\r\nWindows 用户建议使用 x64 包，Win7 不再支持，需升级到 Win10/11 或使用 Linux。软件内置 Webview2 环境，适合缺少该环境的系统。GitHub Releases 提供正式版和测试版下载，并有常见问题解答和源码编译指南。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/AVGxxb8EPlk&lt;/Notice&gt;\r\n\r\n### 下载和安装\r\n\r\n去 [Clash Verge 的官网][1]或 [GitHub 下载](https://github.com/clash-verge-rev/clash-verge-rev/releases)安装包。Windows 下双击 `.exe` 文件安装，macOS 下拖拽 `.dmg` 文件到应用文件夹，Linux 下给 `.AppImage` 文件权限后运行。安装完打开，界面很清爽。\r\n\r\n[![Clash Verge Rev 下载和安装-安装](/images/posts/2025/03/23/clash-verge-rev-an-zhuang.webp)](/images/posts/2025/03/23/clash-verge-rev-an-zhuang.webp)\r\n\r\n### 导入订阅\r\n\r\n订阅就是你的节点信息，可以从机场（服务商）或自己搭建的订阅链接获取。打开 Clash Verge，点左侧的 `订阅`。选择用 URL（粘贴订阅链接）导入。导入后，配置文件会显示在列表里，点一下就能用。\r\n\r\n[![Clash Verge Rev 下载和安装-导入订阅](/images/posts/2025/03/23/clash-verge-rev-dao-ru-ding-yue.webp)](/images/posts/2025/03/23/clash-verge-rev-dao-ru-ding-yue.webp)\r\n\r\n### 选节点和模式\r\n\r\n选节点。点左侧的 `代理`，在代理组里选一个节点，点一下就能切换。\r\n\r\n选模式。在右上角的模式里选：\r\n\r\n&lt;Tabs client:load&gt;\r\n&lt;Tab name=\&quot;规则\&quot;&gt;\r\n按规则走代理，适合日常上网。\r\n&lt;/Tab&gt;\r\n&lt;Tab name=\&quot;全局\&quot;&gt;\r\n所有流量都走代理。\r\n&lt;/Tab&gt;\r\n&lt;Tab name=\&quot;直连\&quot;&gt;\r\n所有流量都不走代理。\r\n&lt;/Tab&gt;\r\n&lt;/Tabs&gt;\r\n\r\n[![Clash Verge Rev 下载和安装-选节点和模式](/images/posts/2025/03/23/clash-verge-rev-xuan-jie-dian-he-mo-shi.webp)](/images/posts/2025/03/23/clash-verge-rev-xuan-jie-dian-he-mo-shi.webp)\r\n\r\n### 开代理或 Tun 模式\r\n\r\n系统代理。点左侧的 `设置`。打开 `系统代理` 开关，Clash Verge 会自动设置系统代理。\r\n\r\nTun 模式。点左侧的 `设置`。打开 `Tun 模式` 开关，适合游戏或命令行工具等复杂场景。\r\n\r\n[![Clash Verge Rev 开代理或 Tun 模式-开代理](/images/posts/2025/03/23/clash-verge-rev-kai-dai-li.webp)](/images/posts/2025/03/23/clash-verge-rev-kai-dai-li.webp)\r\n\r\n### 其他功能\r\n\r\n配置文件管理。可以编辑、复制、删除配置文件。\r\n\r\nWebDav 备份。用 WebDav 服务备份和同步配置。\r\n\r\n可视化编辑。通过图形界面编辑节点和规则，操作更直观。\r\n\r\n[![Clash Verge Rev 开代理或 Tun 模式-其他功能](/images/posts/2025/03/23/clash-verge-rev-qi-ta-gong-neng.webp)](/images/posts/2025/03/23/clash-verge-rev-qi-ta-gong-neng.webp)\r\n\r\nClash Verge 是一个简单又好用的科学上网工具。通过这篇教程，你已经学会了怎么下载安装、导入订阅、选节点和模式、开代理或 Tun 模式。用它上网更自由，也更安全。如果有问题，可以去 GitHub 上找答案或提建议。快去试试吧！\r\n\r\n**参考资料**\r\n\r\n1. [简介 - Clash Verge Rev Docs][1]\r\n2. [快速入门 - Clash Verge Rev Docs][2]\r\n3. [clash-verge-rev/clash-verge-rev: A modern GUI client based on Tauri, designed to run in Windows, macOS and Linux for tailored proxy experience - GitHub][3]\r\n\r\n[1]: https://www.clashverge.dev/\r\n[2]: https://www.clashverge.dev/guide/quickstart.html\r\n[3]: https://github.com/clash-verge-rev/clash-verge-rev&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/miaoko&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;MiaoKo：机场测速工具，支持节点批量测速&quot;],&quot;meta_title&quot;:[0,&quot;MiaoKo：机场测速工具，支持节点批量测速&quot;],&quot;description&quot;:[0,&quot;机场测速可以帮助我们更好地了解节点的网络状况，并为选择和管理节点提供参考，同时提升上网体验。MiaoKo 是一款自动化测试机器人，不仅能自动测试节点，还能生成详细报告。本文将介绍 MiaoKo 的使用教程，包括加入群组、积分获取、指令发送等，为确保你能顺利使用这一 TG 测速机器人。&quot;],&quot;date&quot;:[3,&quot;2025-03-04T11:27:05.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/04/miaoko.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;科学上网&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Mark Dinn&quot;]]],&quot;tags&quot;:[1,[[0,&quot;telegram 机器人&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;机场测速可以帮助我们更好地了解节点的网络状况，并为选择和管理节点提供参考，同时提升上网体验。MiaoKo 是一款自动化测试机器人，不仅能自动测试节点，还能生成详细报告。本文将介绍 MiaoKo 的使用教程，包括加入群组、积分获取、指令发送等，为确保你能顺利使用这一 TG 测速机器人。\r\n\r\n## MiaoKo 使用教程\r\n\r\n目前 MiaoKo 已停止开发，只能通过租用权限使用服务，这里选择使用“翻翻墙”维护的基于 MiaoKo 测速机器人（FFQ.LA Public Test Center）。翻翻墙采用积分制管理，测试时会扣除相应积分，也可贡献后端服务以享受所有权限。翻翻墙测速机器人不仅支持订阅速度测试，还支持拓扑结构、流媒体、延迟等测试。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/CGfgnxcbAj8&lt;/Notice&gt;\r\n\r\n### 加入群组\r\n\r\n使用机器人前需加入 [🛫 翻翻墙 | 公益测速 - 积分制](https://t.me/FFQMiaokoPublic)（以下简称“积分群”）群组。每日签到前需加入 [🛫 翻翻墙 | ✨ MiaoKo | ⛱ 人才交流中心](https://t.me/FFQGroup)（以下简称“交流群”）群组，聊天吹水也在该群内进行。\r\n\r\n### 获取积分\r\n\r\n积分获取主要通过群内每日签到、聊天吹水、购买积分等方式。每日签到请在交流群内发送 `/签到` 。\r\n\r\n### 发送指令\r\n\r\n在积分群内发送 `/help@FFQPublicBot` 获取帮助菜单。带有 \&quot;url\&quot; 的指令可使用订阅链接进行测试，如速度测试 `/speedurl 订阅链接`。你也可以发送 `/ffq`，无需记住指令。\r\n\r\n[![miaoko发送指令](/images/posts/2025/03/04/miaoko-fa-song-zhi-ling.webp)](/images/posts/2025/03/04/miaoko-fa-song-zhi-ling.webp) \r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;更多指令说明请移步《[MiaoKo v4 命令详细文档][3]》。&lt;/Notice&gt;\r\n\r\n### 测试步骤\r\n\r\n向机器人发送测试指令后，按以下操作进行：\r\n\r\n选择测试后端。此时会通过后端宽带进行测试，如测试结果不佳时，可随时更换后端。\r\n\r\n[![miaoko测试步骤-选择测试后端](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-ce-shi-hou-duan.webp)](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-ce-shi-hou-duan.webp)\r\n\r\n选择排序方式。按需选择或默认即可。\r\n\r\n[![miaoko测试步骤-选择排序方式](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-pai-xu-fang-shi.webp)](/images/posts/2025/03/04/miaoko-ce-shi-bu-zhou-pai-xu-fang-shi.webp)\r\n\r\n等待测试完成，结果会公布在群内，需注意查看，不要被后续测试顶上去找不到。\r\n\r\n### 查看报告\r\n\r\n测试完成后，群内会收到测速图报告，但不会有提醒。\r\n\r\n[![miaoko查看报告](/images/posts/2025/03/04/miaoko-cha-kan-bao-gao.webp)](/images/posts/2025/03/04/miaoko-cha-kan-bao-gao.webp)\r\n\r\n机场测速完成后，你可以选择低延迟高速度的节点，提升上网体验。不同时间段的数据会有所不同，为避免晚高峰，可选择在早上测速。测速前最好征得商家的同意，否则短时间内大量消耗流量可能引起注意，导致账号被封禁。\r\n\r\n**参考资料**\r\n\r\n1. [MiaoKo 官方网站][1]  \r\n2. [FFQ MiaoKo 公益测速机器人使用说明 - 翻翻墙导航][2]  \r\n3. [MiaoKo v4 命令详细文档 - 翻翻墙导航][3]\r\n\r\n[1]: https://www.miaoko.net/\r\n[2]: https://www.ffq.la/1180.html\r\n[3]: https://www.ffq.la/1216.html&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/idm-activation-script&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;IDM Activation Script：IDM 激活工具，轻松永久免费使用&quot;],&quot;meta_title&quot;:[0,&quot;IDM Activation Script：IDM 激活工具，轻松永久免费使用&quot;],&quot;description&quot;:[0,&quot;Internet Download Manager（IDM）是一款 Windows 平台上流行的下载工具。不过，IDM 有 30 天的试用期，到期后需要付费购买。为了能够继续免费使用，可以使用 IDM 激活脚本来冻结试用期，达到永久免费使用的目的。&quot;],&quot;date&quot;:[3,&quot;2025-03-24T11:36:40.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/24/idm-activation-script.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;激活工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源软件&quot;],[0,&quot;脚本&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Internet Download Manager（IDM）是一款 Windows 平台上流行的下载工具。不过，IDM 有 30 天的试用期，到期后需要付费购买。为了能够继续免费使用，可以使用 IDM 激活脚本来冻结试用期，达到永久免费使用的目的。\r\n\r\n## IDM Activation Script 使用教程\r\n\r\nIDM Activation Script 是一个开源的命令行及窗口化工具，可以激活 IDM 下载管理器。它可以重置 IDM 的试用期，即使 IDM 更新后，激活信息仍然有效。该脚本支持 Windows 7/8/8.1/10/11 等操作系统。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/aj9LYo5WzrQ&lt;/Notice&gt;\r\n\r\n### 推荐方法\r\n\r\n打开 PowerShell。右键单击 Windows 开始菜单，选择 PowerShell 或终端管理员（不是 CMD）。\r\n\r\n运行脚本。复制并粘贴以下命令到 PowerShell 窗口中，然后按回车键：\r\n\r\n```powershell\r\niex(irm is.gd/idm_reset)\r\n```\r\n\r\n按照提示操作。在出现的“IDM Activation Script”窗口中，按照说明进行操作即可。建议选择“Freeze Trial”选项来锁定 30 天试用期。\r\n\r\n[![IDM Activation Script 推荐方法-IAS](/images/posts/2025/03/24/idm-activation-script-window.webp)](/images/posts/2025/03/24/idm-activation-script-window.webp)\r\n\r\n以下为 IDM 30 天试用期已成功冻结为终身试用期截图。\r\n\r\n[![IDM Activation Script 推荐方法-IAS Freeze Trial](/images/posts/2025/03/24/idm-activation-script-freeze-trial.webp)](/images/posts/2025/03/24/idm-activation-script-freeze-trial.webp)\r\n\r\n&lt;Notice type=\&quot;info\&quot;&gt;如果无法连接到远程服务器，可以尝试使用代理软件开 Tun 模式。如何开 Tun 模式请移步《[Clash Verge Rev 使用教程](/2025/03/clash-verge-rev)》。&lt;/Notice&gt;\r\n\r\n#### 备用方法\r\n\r\n下载脚本。从 GitHub [下载 IDM Activation Script][2]。\r\n\r\n运行脚本。找到下载的 `IAS.cmd` 文件，右键单击并选择“以管理员身份运行”。\r\n\r\n选择操作。按照脚本提示，选择“Freeze Trial”选项来冻结试用期。\r\n\r\nIDM Activation Script 是一个实用的工具，可以帮助用户免费使用 IDM。按照上述步骤操作，即可轻松冻结 IDM 的试用期。建议使用 PowerShell 方法，并定期更新脚本以获得最佳效果。\r\n\r\n**参考资料**\r\n\r\n1. [lstprjct/IDM-Activation-Script: IDM Activation &amp; Trail Reset Script - GitHub][1]\r\n2. [Releases · lstprjct/IDM-Activation-Script - GitHub][2]\r\n\r\n[1]: https://github.com/lstprjct/IDM-Activation-Script\r\n[2]: https://github.com/lstprjct/IDM-Activation-Script/releases&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/geek-uninstaller&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Geek Uninstaller：卸载软件工具，深度清理顽固程序&quot;],&quot;meta_title&quot;:[0,&quot;Geek Uninstaller：卸载软件工具，深度清理顽固程序&quot;],&quot;description&quot;:[0,&quot;在日常使用电脑时，我们经常会安装各种软件，但卸载时却可能遇到残留文件、顽固程序无法删除等问题。Geek Uninstaller 作为一款轻量级、高效的免费卸载工具，能够帮助用户彻底清理软件及其残留文件，甚至支持卸载 Microsoft Store 应用。本教程将详细介绍 Geek Uninstaller 的功能特点、使用方法以及如何利用它优化系统性能。&quot;],&quot;date&quot;:[3,&quot;2025-03-25T20:26:28.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/25/geek-uninstaller.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;实用工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;Windows&quot;],[0,&quot;卸载程序&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;在日常使用电脑时，我们经常会安装各种软件，但卸载时却可能遇到残留文件、顽固程序无法删除等问题。Geek Uninstaller 作为一款轻量级、高效的免费卸载工具，能够帮助用户彻底清理软件及其残留文件，甚至支持卸载 Microsoft Store 应用。本教程将详细介绍 Geek Uninstaller 的功能特点、使用方法以及如何利用它优化系统性能。\r\n\r\n## Geek Uninstaller 使用教程\r\n\r\nGeek Uninstaller 是一款便携式卸载工具，支持 Windows 8/8.1/10/11 等系统，具备以下核心功能：深度卸载、强制卸载、Microsoft Store 应用卸载、多语言支持、便携性。此外，Geek Uninstaller 还提供 Pro 版本，包含更多高级功能，如批量卸载、实时安装监控、启动项管理等。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/4OHGbHnfgfM&lt;/Notice&gt;\r\n\r\n### 下载安装\r\n\r\n从官网[下载 Geek Uninstaller][2] 免费版或试用 Pro 版。下载完成后，无需安装，直接双击 .exe 文件即可运行。\r\n\r\n[![Geek Uninstaller 下载安装](/images/posts/2025/03/25/geek-uninstaller-xia-zai-an-zhuang.webp)](/images/posts/2025/03/25/geek-uninstaller-xia-zai-an-zhuang.webp)\r\n\r\n### 使用方法\r\n\r\n**卸载普通程序**\r\n\r\n打开 Geek Uninstaller，程序会自动扫描已安装的软件。右键点击目标程序，选择“卸载”，按照提示完成卸载。卸载完成后，Geek Uninstaller 会自动扫描残留文件和注册表项，点击“删除”彻底清理。\r\n\r\n[![Geek Uninstaller 使用方法-卸载普通程序](/images/posts/2025/03/25/geek-uninstaller-shi-yong-fang-fa-xie-zai-pu-tong-cheng-xu.webp)](/images/posts/2025/03/25/geek-uninstaller-shi-yong-fang-fa-xie-zai-pu-tong-cheng-xu.webp)\r\n\r\n**卸载顽固程序**\r\n\r\n如果某个程序无法正常卸载，右键点击该程序，选择“强制删除”。按照提示操作，Geek Uninstaller 会尝试强制清除该程序的所有相关文件。\r\n\r\n**卸载 Microsoft Store 应用**\r\n\r\n在 Geek Uninstaller 界面顶部，在“查看”里切换到“Windows Store Apps”标签页。右键选择要卸载的应用，点击“卸载”即可。\r\n\r\n### 高级功能（Pro 版）\r\n\r\n- 批量卸载多个程序。\r\n- 实时安装监控，跟踪更改的文件和注册表项。\r\n- 管理开机启动项，优化启动速度。\r\n\r\n### 常见问题\r\n\r\n&lt;Accordion client:load title=\&quot;为什么在使用强制卸载功能前，需要备份重要数据？\&quot;&gt;\r\n强制卸载功能会深度清除程序相关的文件和注册表项，操作不当可能误删系统关键文件，导致系统不稳定或数据丢失。因此，备份重要数据可以避免意外情况发生。\r\n&lt;/Accordion&gt;\r\n&lt;Accordion client:load title=\&quot;为什么某些安全软件会误报 Geek Uninstaller？如何解决？\&quot;&gt;\r\n由于 Geek Uninstaller 的深度扫描和清理功能，某些安全软件可能会将其误判为潜在威胁。解决方法是暂时关闭安全软件防护，或将 Geek Uninstaller 添加到信任列表。\r\n&lt;/Accordion&gt;\r\n\r\nGeek Uninstaller 是一款功能强大且易于使用的卸载工具，无论是普通用户还是进阶玩家，都能通过它高效管理电脑软件。免费版已能满足基本需求，而 Pro 版则提供了更多高级功能，适合追求极致系统优化的用户。如果你希望彻底清理无用软件、提升电脑性能，不妨下载 Geek Uninstaller 试试吧！\r\n\r\n**参考资料**\r\n\r\n1. [Geek Uninstaller 官方网站][1]\r\n2. [Geek Uninstaller - Download][2]\r\n\r\n[1]: https://geekuninstaller.com/\r\n[2]: https://geekuninstaller.com/download&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/fxsound&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;FxSound：音频增强器，免费提升电脑音质&quot;],&quot;meta_title&quot;:[0,&quot;FxSound：音频增强器，免费提升电脑音质&quot;],&quot;description&quot;:[0,&quot;在当今数字音频时代，优质的音效体验已成为电脑用户的基本需求。FxSound 作为一款专业级的开源音频增强软件，为 Windows 用户提供了强大的音频处理能力。本指南将全面介绍 FxSound 的各项功能，从基础安装到高级音效调整，帮助您充分发挥这款软件的潜力，打造个性化的音频体验。&quot;],&quot;date&quot;:[3,&quot;2025-03-26T21:11:18.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/26/fxsound.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;音频处理&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;],[0,&quot;开源软件&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;在当今数字音频时代，优质的音效体验已成为电脑用户的基本需求。FxSound 作为一款专业级的开源音频增强软件，为 Windows 用户提供了强大的音频处理能力。本指南将全面介绍 FxSound 的各项功能，从基础安装到高级音效调整，帮助您充分发挥这款软件的潜力，打造个性化的音频体验。\r\n\r\n## FxSound 使用教程\r\n\r\nFxSound 是一款集音效增强和用户友好操作于一体的开源软件，为用户提供卓越的音频处理能力。它免费开放并依靠社区支持，为用户提供了丰富的资源和参与机会。无论是安装、功能使用还是导入导出预设，FxSound 都为用户提供了完善的指南和支持，帮助用户畅享高质量音频体验。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/avNOUjP8ZiY&lt;/Notice&gt;\r\n\r\n### 下载安装\r\n\r\n访问 [FxSound 官方网站][1]下载最新的安装包。双击下载的文件，按照提示完成安装过程。\r\n\r\n[![FxSound 下载安装](/images/posts/2025/03/26/fxsound-gui.webp)](/images/posts/2025/03/26/fxsound-gui.webp)\r\n\r\n### 使用方法\r\n\r\n**音效调整**\r\n\r\nFxSound 提供多种音效设置，用户可根据个人喜好自定义音频输出：\r\n\r\n- 清晰度：增强高频部分，使声音更清晰、细腻。\r\n- 环境：模拟音乐厅等大型空间，增加音频的立体感和空间感。\r\n- 环绕声：扩展立体声效果，使音频的空间感更加开阔。\r\n- 动态增强：平滑音量波动，使整体音量更加均匀，提升力度。\r\n- 低音增强：强化低频，提升音乐的震撼力和深度。\r\n\r\n**均衡器（EQ）调整**\r\n\r\n通过拖动 EQ 控件，增强或减弱特定频率（如低音、中音、高音）：\r\n\r\n- 低频：如果您想要更多低音，您可以使用 EQ 来调高低频。\r\n- 中频：如果您想添加一些“沙哑”特性，您可以调整中频。\r\n- 高频：如果您的音频太刺耳，您可以降低 EQ 的高音范围。\r\n\r\n[![](/images/posts/2025/03/26/fxsound-eq.webp)](/images/posts/2025/03/26/fxsound-eq.webp)\r\n\r\n**预设管理**\r\n\r\n导出预设。打开 FxSound 设置菜单，选择“导出预设”，选择需要导出的预设文件，确认后保存至本地。\r\n\r\n导入预设。将预设文件放置在已知目录（如桌面或文档文件夹），在 FxSound 设置中选择“导入预设”，导航至文件并加载。\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;你可以前往官方[下载额外预设](https://www.fxsound.com/presets)，解压并导入。&lt;/Notice&gt;\r\n\r\n[![FxSound 预设](/images/posts/2025/03/26/fxsound-presets.webp)](/images/posts/2025/03/26/fxsound-presets.webp)\r\n\r\n通过本文的教程，相信你已经掌握了 FxSound 的基本使用方法。无论是调整音效、设置 EQ，还是导入导出预设，你都可以根据自己的喜好，打造个性化的音频体验。同时，由于 FxSound 已经开源，欢迎广大用户参与到社区建设中来，共同完善这款优秀的音频处理软件。\r\n\r\n**参考资料**\r\n\r\n1. [FxSound 官方网站][1]\r\n2. [Articles, Courses, Guides, and Support - FxSound Learning Center][2]\r\n3. [FxSound - GitHub 仓库][3]\r\n\r\n[1]: https://www.fxsound.com/\r\n[2]: https://www.fxsound.com/learning-center\r\n[3]: https://github.com/fxsound2/fxsound-app&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/03/sound-lock&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Sound Lock：音量控制器，PUBG 听声辩位利器&quot;],&quot;meta_title&quot;:[0,&quot;Sound Lock：音量控制器，PUBG 听声辩位利器&quot;],&quot;description&quot;:[0,&quot;Sound Lock 是一款专为电脑设计的有效声音输出控制器，能够让用户在不打扰周围人的情况下享受电影和节目。它支持 Windows Vista 及以上版本的操作系统，并且可以针对每个通道（最多 14 个通道）调整系统音量，为每个输出设备设置单独的音量限制。&quot;],&quot;date&quot;:[3,&quot;2025-03-29T00:54:25.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/03/29/sound-lock.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;实用工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Sound Lock 是一款专为电脑设计的有效声音输出控制器，能够让用户在不打扰周围人的情况下享受电影和节目。它支持 Windows Vista 及以上版本的操作系统，并且可以针对每个通道（最多 14 个通道）调整系统音量，为每个输出设备设置单独的音量限制。\r\n\r\n## Sound Lock 使用教程\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/BrpCKoMiIEA&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Sound Lock 下载\&quot; link=\&quot;https://www.3appes.com/sound-lock/\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载完成后，运行安装文件（如 `Sound_Lock_Setup.msi`），按照提示完成安装。\r\n\r\n### 使用说明\r\n\r\n&lt;figure&gt;\r\n[![Sound Lock 界面](/images/posts/2025/03/29/sound-lock-gui.webp)](/images/posts/2025/03/29/sound-lock-gui.webp)\r\n&lt;figcaption&gt;Sound Lock 界面&lt;/figcaption&gt;\r\n&lt;/figure&gt;\r\n\r\n1. **启动软件**：安装完成后，打开 Sound Lock 软件，点击 `ON` 按钮启动应用。\r\n2. **设置音量限制**：\r\n- 点击 `Settings` 按钮进入设置界面。\r\n- 输出设备保持默认设置，不需要更改。\r\n- 输出通道全部勾选（默认）。\r\n- 过滤模式设置为 `Filter per channel`（默认）。\r\n3. **自动启动设置**：如果需要软件在系统启动时自动运行，可以勾选 `Launch Sound Lock...` 和 ` Automatically enable Sound Lock...` 。\r\n\r\n&lt;figure&gt;\r\n[![Sound Lock 设置](/images/posts/2025/03/29/sound-lock-settings.webp)](/images/posts/2025/03/29/sound-lock-settings.webp)\r\n&lt;figcaption&gt;Sound Lock 设置&lt;/figcaption&gt;\r\n&lt;/figure&gt;\r\n\r\n### 应用场景\r\n\r\n在 PUBG 游戏中使用 Sound Lock 软件来控制音频水平，帮助玩家更好地听清脚步声而不受枪声干扰。\r\n\r\n### 结论\r\n\r\nSound Lock 是一款高效的电脑声音输出控制器，能够在不影响观影体验的情况下限制声音输出，确保不会干扰周围人。通过设置音量限制和自定义每个通道的音量，用户可以轻松享受电影和游戏。使用 Sound Lock 时，用户应注意正确设置输出设备和通道，以确保最佳音质体验。\r\n\r\n**参考资料**\r\n\r\n1. [Sound Lock 官方网站][1]\r\n2. [Sound Lock? : r/PUBATTLEGROUNDS - Reddit][2]\r\n\r\n[1]: https://www.3appes.com/sound-lock/\r\n[2]: https://www.reddit.com/r/PUBATTLEGROUNDS/comments/c92ynu/sound_lock/&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/anytxt-searcher&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Anytxt Searcher：全文搜索工具，快速定位文件内容&quot;],&quot;meta_title&quot;:[0,&quot;Anytxt Searcher：全文搜索工具，快速定位文件内容&quot;],&quot;description&quot;:[0,&quot;Anytxt Searcher 是一款功能强大的文件内容搜索工具，适用于多种 Windows 版本，包括 Windows 11、10、8、7 至 2003 版本。它支持多种文档格式的全文索引，包括 Microsoft Office 格式、PDF、电子书格式、WPS Office 格式，甚至是图像中的文本内容。Anytxt Searcher 还提供多语言支持和快速全文搜索功能，几乎只需 1 秒即可获得搜索结果。&quot;],&quot;date&quot;:[3,&quot;2025-04-03T10:44:46.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/03/anytxt-searcher.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;文字处理&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;OCR&quot;],[0,&quot;PDF&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Anytxt Searcher 是一款功能强大的文件内容搜索工具，适用于多种 Windows 版本，包括 Windows 11、10、8、7 至 2003 版本。它支持多种文档格式的全文索引，包括 Microsoft Office 格式、PDF、电子书格式、WPS Office 格式，甚至是图像中的文本内容。Anytxt Searcher 还提供多语言支持和快速全文搜索功能，几乎只需 1 秒即可获得搜索结果。\r\n\r\n## Anytxt Searcher 使用教程\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;观看视频教程请移步：https://youtu.be/Ax7Hpkx99zs&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Anytxt Serarcher 下载\&quot; link=\&quot;https://anytxt.net/download/\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n下载完成后，双击 `Anytxt_1.3.2034_Windows_x86_64.exe` 安装包按照提示进行安装。整个过程简单快速，不需要额外的软件支持。\r\n\r\n### 使用说明\r\n\r\n&lt;figure&gt;\r\n[![Anytxt Searcher 界面](/images/posts/2025/04/03/anytxt-searcher-gui.webp)](/images/posts/2025/04/03/anytxt-searcher-gui.webp)\r\n&lt;figcaption&gt;Anytxt Searcher 界面&lt;/figcaption&gt;\r\n&lt;/figure&gt;\r\n\r\n1. **启动软件**：安装完成后，启动 Anytxt Searcher，软件会自动开始索引电脑中的文件。\r\n2. **开始搜索**：在搜索框中输入关键词，按回车键即可开始搜索。搜索结果将在几秒钟内显示。\r\n3. **查看文件内容**：点击搜索结果即可预览文件内容，支持多种文件格式的实时预览。\r\n4. **设置索引目录**：在软件界面中，点击左边的 `...` 按钮，选择需要索引的文件夹或磁盘。\r\n\r\n&lt;figure&gt;\r\n[![Anytxt Searcher 索引](/images/posts/2025/04/03/anytxt-searcher-suo-yin.webp)](/images/posts/2025/04/03/anytxt-searcher-suo-yin.webp)\r\n&lt;figcaption&gt;Anytxt Searcher 过滤 C 盘 `.txt` 文件&lt;/figcaption&gt;\r\n&lt;/figure&gt;\r\n\r\n### 结论\r\n\r\nAnytxt Searcher 是一款非常有用的文件内容搜索工具，能够大大提高工作效率。它支持多种文件格式，提供快速全文搜索功能，并支持多语言文档的全文索引。使用 Anytxt Searcher 时，需要注意以下几点：\r\n\r\n- **定期更新索引**：确保索引是最新的，以便搜索到最新的文件内容。\r\n- **设置合适的索引目录**：避免索引不必要的文件夹，以提高搜索效率。\r\n- **利用高级功能**：Anytxt Searcher 提供了多种高级功能，如 AES256 加密和多语言 OCR，用户可以根据需要进行配置。\r\n\r\n**参考资料**\r\n\r\n1. [Anytxt Searcher 官方网站][1]\r\n2. [Anytxt Searcher 用户手册][2]\r\n\r\n[1]: https://anytxt.net/\r\n[2]: https://anytxt.net.cn/usermanual/1.1.%E5%BC%80%E5%A7%8B%E6%90%9C%E7%B4%A2.html&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/microsoft-activation-scripts&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Microsoft Activation Scripts：KMS 激活工具，Windows、Office 永久激活不求人&quot;],&quot;meta_title&quot;:[0,&quot;Microsoft Activation Scripts：KMS 激活工具，Windows、Office 永久激活不求人&quot;],&quot;description&quot;:[0,&quot;Microsoft Activation Scripts (MAS) 是一个开源工具，帮助用户激活 Windows 和 Office。它支持多种激活方式，包括永久和临时方案，适用于 Windows 7 到 11 以及 Office 2013 到 365。无论是个人还是企业用户，遇到激活问题时，MAS 都能提供简单可靠的解决方案。&quot;],&quot;date&quot;:[3,&quot;2025-04-13T06:08:33.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/13/microsoft-activation-scripts.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;激活工具&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;windows&quot;],[0,&quot;开源软件&quot;],[0,&quot;脚本&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Microsoft Activation Scripts（MAS）是一个开源工具，帮助用户激活 Windows 和 Office。它支持多种激活方式，包括永久和临时方案，适用于 Windows 7 到 11 以及 Office 2013 到 365。无论是个人还是企业用户，遇到激活问题时，MAS 都能提供简单可靠的解决方案。\r\n\r\n## Microsoft Activation Scripts 使用教程\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;因 YouTube 的《社区准则》，无视频教程。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\nMAS 提供两种下载方式：\r\n\r\n1. **PowerShell 方法（推荐）**\r\n\r\n    - 打开 PowerShell 或终端（右键点击开始菜单选择 PowerShell 或终端）。\r\n    - 输入以下命令并按回车：\r\n    ``` powershell\r\n    irm https://get.activated.win | iex\r\n    ```\r\n    - 如果上述命令无法使用，可尝试备用命令：\r\n    ``` powershell\r\n    irm https://massgrave.dev/get | iex\r\n    ```\r\n    - 下载完成后，您将看到激活选项。\r\n\r\n2. **传统方法**\r\n\r\n    - 从以下链接下载 ZIP 文件：\r\n    ``` http\r\n    https://github.com/massgravel/Microsoft-Activation-Scripts/archive/refs/heads/master.zip\r\n    ```\r\n    - 解压 ZIP 文件后，进入名为 `All-In-One-Version` 的文件夹。\r\n    - 找到并运行 `MAS_AIO.cmd` 文件。\r\n\r\n### 安装\r\n\r\nMAS 不需要复杂安装，只需运行下载的脚本即可开始使用。对于 PowerShell 方法，直接执行上述命令；对于传统方法，运行解压后的脚本文件即可。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-gui.webp\&quot;\r\n    alt=\&quot;Microsoft Activation Scripts 界面\&quot;\r\n/&gt;\r\n\r\n1. **选择激活选项**\r\n\r\n    在 PowerShell 或传统方法中运行脚本后，根据提示选择激活方式：\r\n    - 按 `1` 激活 Windows（HWID 方法）。\r\n    - 按 `2` 激活 Office（Ohook 方法）。\r\n\r\n2. **故障排除**\r\n\r\n    如果脚本未能正常运行，请检查以下几点：\r\n    - 确保 URL 来源安全可靠。\r\n    - 如果 PowerShell 方法失败，可尝试传统方法。\r\n    - 查看脚本中的蓝色文字提示以获取故障排除步骤。\r\n\r\n&lt;Image \r\n  src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-hwid.webp\&quot; \r\n  alt=\&quot;MAS Windows 激活\&quot; \r\n/&gt;\r\n&lt;Image\r\n    src=\&quot;/images/posts/2025/04/13/microsoft-activation-scripts-ohook.webp\&quot;\r\n    alt=\&quot;MAS Office 激活\&quot;\r\n/&gt;\r\n\r\nMAS 是一款免费、高效的激活工具，支持 Windows 和 Office 的多种激活方式，操作简单。使用时需注意：确保下载来源安全，硬件变更后可能需要重新激活，部分产品（如 Mac 版 Office）不适用。它是个人和企业用户解决激活问题的便捷选择。\r\n\r\n**参考资料**\r\n\r\n1. [Microsoft Activation Scripts 官网][1]\r\n2. [HWID Activation - MAS][2]\r\n3. [Ohook Activation - MAS][3]\r\n4. [Microsoft Activation Scripts - GitHub][4]\r\n\r\n[1]: https://massgrave.dev/\r\n[2]: https://massgrave.dev/hwid\r\n[3]: https://massgrave.dev/ohook\r\n[4]: https://github.com/massgravel/Microsoft-Activation-Scripts&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025/04/real-esrgan&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Real-ESRGAN：图片修复工具，AI 图像增强利器&quot;],&quot;meta_title&quot;:[0,&quot;Real-ESRGAN：图片修复工具，AI 图像增强利器&quot;],&quot;description&quot;:[0,&quot;Real-ESRGAN 是一款基于人工智能的图像和视频超分辨率修复工具，专注于提升现实世界中图像的清晰度和细节表现。它不仅支持普通照片的放大和修复，还针对动漫视频和插画提供了专门优化的模型，适合图像修复、动漫视频增强、老旧照片修复等多种应用场景。Real-ESRGAN 支持 Windows、Linux 和 macOS 等主流系统平台，且提供了跨平台的可执行文件和图形用户界面，方便不同用户群体使用。&quot;],&quot;date&quot;:[3,&quot;2025-04-14T08:51:29.000Z&quot;],&quot;image&quot;:[0,&quot;/images/posts/2025/04/15/real-esrgan.webp&quot;],&quot;categories&quot;:[1,[[0,&quot;图像处理&quot;],[0,&quot;视频处理&quot;]]],&quot;authors&quot;:[1,[[0,&quot;John Doe&quot;]]],&quot;tags&quot;:[1,[[0,&quot;开源&quot;],[0,&quot;脚本&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Real-ESRGAN 是一款基于人工智能的图像和视频超分辨率修复工具，专注于提升现实世界中图像的清晰度和细节表现。它不仅支持普通照片的放大和修复，还针对动漫视频和插画提供了专门优化的模型，适合图像修复、动漫视频增强、老旧照片修复等多种应用场景。Real-ESRGAN 支持 Windows、Linux 和 macOS 等主流系统平台，且提供了跨平台的可执行文件和图形用户界面，方便不同用户群体使用。\r\n\r\n## Real-ESRGAN 使用教程\r\n\r\n&lt;Notice type=\&quot;note\&quot;&gt;视频教程正在创作，请期待。&lt;/Notice&gt;\r\n\r\n### 下载\r\n\r\n&lt;Button label=\&quot;Real-ESRGAN 下载\&quot; link=\&quot;https://github.com/xinntao/Real-ESRGAN/releases/tag/v0.2.5.0\&quot; style=\&quot;solid\&quot; /&gt;\r\n&lt;Button label=\&quot;FFmpeg 下载\&quot; link=\&quot;https://ffmpeg.org/download.html\&quot; style=\&quot;solid\&quot; /&gt;\r\n\r\n### 安装\r\n\r\n- 下载完成后，将压缩包解压到指定文件夹，例如“Real-ESRGAN”文件夹。\r\n- 对于视频处理，建议安装 FFmpeg 以便提取和合成视频帧。\r\n\r\n### 使用说明\r\n\r\n&lt;Image\r\n   src=\&quot;/images/posts/2025/04/15/real-esrgan-rendering.webp\&quot;\r\n   alt=\&quot;Real-ESRGAN 图像修复效果图\&quot;\r\n/&gt;\r\n\r\n- **图像超分辨率**\r\n\r\n通过命令行进入可执行文件所在目录，执行命令示例：\r\n\r\n```powershell\r\nrealesrgan-ncnn-vulkan.exe -i input.jpg -o output.png -n realesrgan-x4plus\r\n```\r\n\r\n其中 `-i` 指定输入图像，`-o` 指定输出文件，`-n` 指定模型名称（默认为 `realesrgan-x4plus`，也可选择动漫优化模型等）。\r\n\r\n- **视频超分辨率**\r\n\r\n**步骤 1**：使用 FFmpeg 提取视频帧\r\n\r\n```\r\nffmpeg -i onepiece_demo.mp4 -qscale:v 1 -qmin 1 -qmax 1 -vsync 0 tmp_frames/frame%08d.png\r\n```\r\n\r\n记住提前创建文件夹 `tmp_frames`。\r\n\r\n**步骤 2**：使用 Real-ESRGAN 执行文件进行推理\r\n\r\n以 Windows 操作系统为例，执行命令：\r\n\r\n```\r\nrealesrgan-ncnn-vulkan.exe -i tmp_frames -o out_frames -n realesr-animevideov3 -s 2 -f jpg\r\n```\r\n\r\n记住提前创建文件夹 `out_frames`。\r\n\r\n**步骤 3**：将增强后的帧重新编码成视频\r\n\r\n首先从输入视频中获得 FPS：\r\n\r\n```\r\nffmpeg -i onepiece_demo.mp4\r\n```\r\n\r\n您将得到类似于以下屏幕截图的输出。\r\n\r\n&lt;Image \r\n   src=\&quot;/images/posts/2025/04/15/real-esrgan-fps.webp\&quot;\r\n   alt=\&quot;Real-ESRGAN 获取视频 FPS\&quot;\r\n/&gt;\r\n\r\n合并视频：\r\n\r\n```\r\nffmpeg -r 23.98 -i out_frames/frame%08d.jpg -c:v libx264 -r 23.98 -pix_fmt yuv420p output.mp4\r\n```\r\n\r\n如果您还想保留原始音频，可以使用以下命令：\r\n\r\n```\r\nffmpeg -r 23.98 -i out_frames/frame%08d.jpg -i onepiece_demo.mp4 -map 0:v:0 -map 1:a:0 -c:a copy -c:v libx264 -r 23.98 -pix_fmt yuv420p output_w_audio.mp4\r\n```\r\n\r\nReal-ESRGAN 作为一款实用的图像和视频超分辨率工具，极大地提升了图像细节和清晰度，适用于照片修复、动漫视频放大、老旧影像修复等多种场景。其跨平台的可执行文件和图形界面降低了使用门槛，支持多种模型和自定义微调，满足不同用户需求。使用时需注意选择合适的模型和放大倍数，视频处理需配合 FFmpeg 等工具。\r\n\r\n**参考资料**\r\n\r\n1. [Real-ESRGAN - GitHub][1]\r\n2. [Real-ESRGAN 动漫视频模型介绍 - GitHub][2]\r\n3. [Real-ESRGAN ncnn Vulkan - GitHub][3]\r\n\r\n[1]: https://github.com/xinntao/Real-ESRGAN/blob/master/README_CN.md\r\n[2]: https://github.com/xinntao/Real-ESRGAN/blob/master/docs/anime_video_model.md\r\n[3]: https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan&quot;]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;SearchBar&quot;,&quot;value&quot;:true}" await-children><div class="min-h-[45vh]"><input class="form-input w-full text-center" placeholder="在此输入搜索文章" type="text" autoComplete="off" autofocus="" name="search" value=""/><div class="row"></div></div><!--astro:end--></astro-island> </div> </section>  </main> <footer class="section bg-theme-dark"> <div class="container text-center">  <ul class="mb-8 space-x-4"> <li class="inline-block"> <a href="/about" class="p-4 text-white/75 hover:text-white transiti
